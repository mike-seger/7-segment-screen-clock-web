<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta property="og:image" content="./screens/screenshot.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=0.67,
      maximum-scale=0.67, minimum-scale=0.67, user-scalable=no" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"> -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<div id="menuPlaceholder"></div>

<div id="clock">
    <div id="clockInner">
        <div id="dateLine">
            <span id="weekday" class="alpha-group"></span>
            <span id="day" class="numeric-group"></span>
            <span id="month" class="alpha-group"></span>
            <span id="year" class="numeric-group"></span>
        </div>

        <div id="timeLine">
            <span id="hour" class="numeric-group"></span>
            <span id="colon-min" class="colon-group">:</span>
            <span id="minute" class="numeric-group"></span>
            <span id="colon-sec" class="colon-group">:</span>
            <span id="sec" class="numeric-group"></span>
        </div>
    </div>
</div>

    <div id="rowCoordinateDisplay" aria-live="polite"></div>


<script>
const days   = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const simulatedWeekdays = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
const simulatedMonths = ["JAN","FEB","MAR","APR","MAY","JUN","JUL"];
let simulationDigit = null;
let simulationWeekday = null;
let simulationMonth = null;
let simulationHour = null;
let timeScaleProbe = null;
let cycleTimer = null;
let cycleStep = 0;
let fontLayoutRequestToken = 0;

const SIZE_BUDGET = 0.95;
const SCALE_SAFETY = 0.98;
const DEFAULT_WEIGHT_GAP = 0.07;
const DEFAULT_FONT_RATIO = 0.07;

function normalizeSizingWeight(value, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.min(0.99, Math.max(0, n));
}

function computeSizingWeights(weightGap, fr) {
  const normalizedGap = normalizeSizingWeight(weightGap, DEFAULT_WEIGHT_GAP);
  const normalizedFr = normalizeSizingWeight(fr, DEFAULT_FONT_RATIO);
  const remaining = Math.max(0, 1 - normalizedGap);
  const weightTime = remaining / (normalizedFr + 1);
  const weightDate = normalizedFr * weightTime;

  return {
    weightGap: normalizedGap,
    fr: normalizedFr,
    weightDate,
    weightTime
  };
}

function getChildrenVisualBounds(element) {
  if (!element) return null;

  const childRects = Array.from(element.children || [])
    .map(child => child.getBoundingClientRect())
    .filter(rect => rect && (rect.width > 0 || rect.height > 0));

  if (!childRects.length) {
    const rect = element.getBoundingClientRect();
    return rect && (rect.width > 0 || rect.height > 0)
      ? { top: rect.top, right: rect.right, bottom: rect.bottom, left: rect.left, width: rect.width, height: rect.height }
      : null;
  }

  const top = Math.min(...childRects.map(rect => rect.top));
  const right = Math.max(...childRects.map(rect => rect.right));
  const bottom = Math.max(...childRects.map(rect => rect.bottom));
  const left = Math.min(...childRects.map(rect => rect.left));

  return {
    top,
    right,
    bottom,
    left,
    width: right - left,
    height: bottom - top
  };
}

function getElementsVisualBounds(elements) {
  const rects = (elements || [])
    .filter(Boolean)
    .map(el => el.getBoundingClientRect())
    .filter(rect => rect && (rect.width > 0 || rect.height > 0));

  if (!rects.length) return null;

  const top = Math.min(...rects.map(rect => rect.top));
  const right = Math.max(...rects.map(rect => rect.right));
  const bottom = Math.max(...rects.map(rect => rect.bottom));
  const left = Math.min(...rects.map(rect => rect.left));

  return {
    top,
    right,
    bottom,
    left,
    width: right - left,
    height: bottom - top
  };
}

function mergeBounds(boundsList) {
  const valid = (boundsList || []).filter(Boolean);
  if (!valid.length) return null;

  const top = Math.min(...valid.map(bounds => bounds.top));
  const right = Math.max(...valid.map(bounds => bounds.right));
  const bottom = Math.max(...valid.map(bounds => bounds.bottom));
  const left = Math.min(...valid.map(bounds => bounds.left));

  return {
    top,
    right,
    bottom,
    left,
    width: right - left,
    height: bottom - top
  };
}

function getTextNodeVisualBounds(textNode) {
  if (!textNode || textNode.nodeType !== Node.TEXT_NODE) return null;
  const text = textNode.textContent || "";
  if (!text.length) return null;

  const range = document.createRange();
  const charBounds = [];

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    if (!char || !char.trim()) continue;

    range.setStart(textNode, i);
    range.setEnd(textNode, i + 1);
    const rect = range.getBoundingClientRect();
    if (rect && (rect.width > 0 || rect.height > 0)) {
      charBounds.push({
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        left: rect.left,
        width: rect.width,
        height: rect.height
      });
    }
  }

  range.detach?.();
  return mergeBounds(charBounds);
}


function getRenderedTextBounds(element) {
  if (!element) return null;

  const walker = document.createTreeWalker(
    element,
    NodeFilter.SHOW_TEXT,
    {
      acceptNode(node) {
        const value = (node && node.textContent) ? node.textContent : "";
        return value.trim().length > 0
          ? NodeFilter.FILTER_ACCEPT
          : NodeFilter.FILTER_SKIP;
      }
    }
  );

  const textBounds = [];
  let current = walker.nextNode();
  while (current) {
    const bounds = getTextNodeVisualBounds(current);
    if (bounds) textBounds.push(bounds);
    current = walker.nextNode();
  }

  return mergeBounds(textBounds);
}

function getElementsRenderedTextBounds(elements) {
  const bounds = (elements || [])
    .filter(Boolean)
    .map(el => getRenderedTextBounds(el))
    .filter(Boolean);
  return mergeBounds(bounds);
}

let rowDebugMetricsCtx = null;

function getRowDebugMetricsContext() {
  if (rowDebugMetricsCtx) return rowDebugMetricsCtx;
  const canvas = document.createElement("canvas");
  rowDebugMetricsCtx = canvas.getContext("2d");
  return rowDebugMetricsCtx;
}

function getCanvasFontFromComputedStyle(style) {
  if (!style) return "16px sans-serif";
  return `${style.fontStyle || "normal"} ${style.fontVariant || "normal"} ${style.fontWeight || "400"} ${style.fontSize || "16px"} ${style.fontFamily || "sans-serif"}`;
}

function getChildInkApproxBounds(child) {
  if (!child) return null;
  const text = (child.textContent || "").trim();
  if (!text) return null;

  const rect = child.getBoundingClientRect();
  if (!rect || !(rect.width > 0 || rect.height > 0)) return null;

  const style = getComputedStyle(child);
  const ctx = getRowDebugMetricsContext();
  if (!ctx) return {
    top: rect.top,
    right: rect.right,
    bottom: rect.bottom,
    left: rect.left,
    width: rect.width,
    height: rect.height
  };

  ctx.font = getCanvasFontFromComputedStyle(style);
  const metrics = ctx.measureText(text);
  const fontAscent = Number(metrics.fontBoundingBoxAscent) || 0;
  const fontDescent = Number(metrics.fontBoundingBoxDescent) || 0;
  const actualAscent = Number(metrics.actualBoundingBoxAscent) || 0;
  const actualDescent = Number(metrics.actualBoundingBoxDescent) || 0;

  const fontHeight = fontAscent + fontDescent;
  const actualHeight = actualAscent + actualDescent;

  const trimRatio = fontHeight > 0 && actualHeight > 0
    ? Math.max(0, Math.min(0.45, (1 - (actualHeight / fontHeight)) / 2))
    : 0;
  const top = rect.top + (rect.height * trimRatio);
  const bottom = rect.bottom - (rect.height * trimRatio);

  return {
    top,
    right: rect.right,
    bottom,
    left: rect.left,
    width: rect.width,
    height: Math.max(0, bottom - top)
  };
}

function getChildrenInkApproxBounds(element) {
  if (!element) return null;
  const bounds = Array.from(element.children || [])
    .map(getChildInkApproxBounds)
    .filter(Boolean);
  return mergeBounds(bounds);
}

function getVisualGapPx(upperBounds, lowerBounds) {
  if (!upperBounds || !lowerBounds) return null;
  return lowerBounds.top - upperBounds.bottom;
}

function getAlphaBoundsInBand(data, width, height, yStart, yEnd) {
  return getAlphaBoundsInRegion(data, width, height, 0, width - 1, yStart, yEnd);
}

function getAlphaBoundsInRegion(data, width, height, xStart, xEnd, yStart, yEnd) {
  if (!data || !width || !height) return null;
  const yMin = Math.max(0, Math.min(height - 1, yStart));
  const yMax = Math.max(0, Math.min(height - 1, yEnd));
  const xMin0 = Math.max(0, Math.min(width - 1, xStart));
  const xMax0 = Math.max(0, Math.min(width - 1, xEnd));
  if (yMax < yMin || xMax0 < xMin0) return null;

  let minX = width;
  let minY = height;
  let maxX = -1;
  let maxY = -1;

  const INK_THRESHOLD = 24;
  for (let y = yMin; y <= yMax; y += 1) {
    const rowOffset = y * width;
    for (let x = xMin0; x <= xMax0; x += 1) {
      const idx = (rowOffset + x) * 4;
      if (data[idx + 3] < 8) continue;
      const brightness = Math.max(data[idx], data[idx + 1], data[idx + 2]);
      if (brightness < INK_THRESHOLD) continue;
      if (x < minX) minX = x;
      if (y < minY) minY = y;
      if (x > maxX) maxX = x;
      if (y > maxY) maxY = y;
    }
  }

  if (maxX < minX || maxY < minY) return null;
  return { minX, minY, maxX, maxY };
}

let _measureTextCanvas = null;
function getMeasureTextCtx() {
  if (!_measureTextCanvas) _measureTextCanvas = document.createElement("canvas");
  return _measureTextCanvas.getContext("2d");
}

function measureRowInkBounds(lineEl) {
  if (!lineEl) return null;
  const rect = lineEl.getBoundingClientRect();
  if (!rect || rect.width <= 0 || rect.height <= 0) return null;

  const ctx = getMeasureTextCtx();
  const children = Array.from(lineEl.children).filter(c => (c.textContent || "").trim().length > 0);
  const measurables = children.length ? children : [lineEl];

  let topMin = Number.POSITIVE_INFINITY;
  let bottomMax = Number.NEGATIVE_INFINITY;
  let leftMin = Number.POSITIVE_INFINITY;
  let rightMax = Number.NEGATIVE_INFINITY;

  for (const child of measurables) {
    const text = child.textContent || "";
    if (!text.trim()) continue;
    const childRect = child.getBoundingClientRect();
    if (!childRect || childRect.height <= 0) continue;

    const cs = getComputedStyle(child);
    const fontSizePx = parseFloat(cs.fontSize) || 0;
    let lineHeightPx = parseFloat(cs.lineHeight);
    if (!Number.isFinite(lineHeightPx) || lineHeightPx <= 0) lineHeightPx = fontSizePx;
    if (fontSizePx <= 0 || lineHeightPx <= 0) continue;

    // The clock is rendered under a CSS scale transform on #clockInner.
    // getBoundingClientRect returns post-transform px; getComputedStyle returns
    // pre-transform CSS px. The effective scale = post / pre, derived from
    // the child's own line box (rect.height pre-transform == lineHeightPx).
    const scale = childRect.height / lineHeightPx;
    if (!Number.isFinite(scale) || scale <= 0) continue;

    ctx.font = `${cs.fontStyle || "normal"} ${cs.fontWeight || "normal"} ${cs.fontSize} ${cs.fontFamily}`;
    const m = ctx.measureText(text);
    if (!m) continue;
    const FA = Number.isFinite(m.fontBoundingBoxAscent) ? m.fontBoundingBoxAscent : fontSizePx * 0.8;
    const FD = Number.isFinite(m.fontBoundingBoxDescent) ? m.fontBoundingBoxDescent : fontSizePx * 0.2;
    const AA = m.actualBoundingBoxAscent || 0;
    const AD = m.actualBoundingBoxDescent || 0;

    // CSS half-leading: baseline = top + (lineHeight + FA - FD) / 2
    // (works for both positive and negative half-leading; when line-height
    // is smaller than the font's intrinsic ascent+descent, glyphs overflow
    // the line box symmetrically and this formula still locates the baseline.)
    const baselineOffset = (lineHeightPx + FA - FD) / 2;
    const baselineY = childRect.top + baselineOffset * scale;

    const top = baselineY - AA * scale;
    const bottom = baselineY + AD * scale;

    if (top < topMin) topMin = top;
    if (bottom > bottomMax) bottomMax = bottom;

    // Horizontal ink bounds: actualBoundingBoxLeft is the distance from the
    // text alignment point (≈ childRect.left) to the left ink edge, positive
    // meaning "to the left". For narrow glyphs like "1" whose ink sits on the
    // right of the advance, ABL is negative — shifting inkLeft rightward.
    //
    // ABR must be corrected for CSS letter-spacing: canvas.measureText does not
    // model it, so each character after the first is rendered (n-1)*ls px
    // further right than canvas assumes.
    const ABL = Number.isFinite(m.actualBoundingBoxLeft)  ? m.actualBoundingBoxLeft  : 0;
    const ABR = Number.isFinite(m.actualBoundingBoxRight) ? m.actualBoundingBoxRight : childRect.width / scale;
    const letterSpacingPx = parseFloat(cs.letterSpacing) || 0;
    const adjustedABR = ABR + Math.max(0, text.length - 1) * letterSpacingPx;
    const inkLeft  = childRect.left - ABL * scale;
    const inkRight = childRect.left + adjustedABR * scale;
    if (inkLeft  < leftMin)  leftMin  = inkLeft;
    if (inkRight > rightMax) rightMax = inkRight;
  }

  if (!Number.isFinite(topMin) || !Number.isFinite(bottomMax)) return null;

  const finalLeft  = Number.isFinite(leftMin)  ? leftMin  : rect.left;
  const finalRight = Number.isFinite(rightMax) ? rightMax : rect.right;
  return {
    left:   finalLeft,
    top:    topMin,
    right:  finalRight,
    bottom: bottomMax,
    width:  Math.max(0, finalRight - finalLeft),
    height: Math.max(0, bottomMax - topMin)
  };
}

function transformBounds(rawBounds, hLocalOffset, hOffsetVp, vOffsetVp, rotation, scale, Cx, Cy) {
  if (!rawBounds) return null;
  const theta = rotation * Math.PI / 180;
  const cos = Math.cos(theta);
  const sin = Math.sin(theta);

  // Four corners of the raw bounding box
  const corners = [
    { x: rawBounds.left, y: rawBounds.top },
    { x: rawBounds.right, y: rawBounds.top },
    { x: rawBounds.left, y: rawBounds.bottom },
    { x: rawBounds.right, y: rawBounds.bottom }
  ];

  const transCorners = corners.map(p => {
    // 1. Apply local scale-1 horizontal translation
    const xL = p.x + hLocalOffset;
    const yL = p.y;

    // 2. Rotate and scale around the pivot (Cx, Cy)
    const dx = xL - Cx;
    const dy = yL - Cy;

    const xRot = (dx * cos - dy * sin) * scale;
    const yRot = (dx * sin + dy * cos) * scale;

    // 3. Project to viewport space including physical offsets
    return {
      x: Cx + hOffsetVp + xRot,
      y: Cy + vOffsetVp + yRot
    };
  });

  const xs = transCorners.map(p => p.x);
  const ys = transCorners.map(p => p.y);
  const left = Math.min(...xs);
  const right = Math.max(...xs);
  const top = Math.min(...ys);
  const bottom = Math.max(...ys);

  return {
    left,
    right,
    top,
    bottom,
    width: right - left,
    height: bottom - top
  };
}

function getClockRowInkBounds(dateLine, timeLine) {
  if (!dateLine || !timeLine) return null;

  const clockInner = document.getElementById("clockInner");
  if (!clockInner) return null;

  // Temporarily neutralize rotation & scale transforms to get reliable unrotated sizing
  const savedClockInnerTransform = clockInner.style.transform;
  const savedTimeLineTransform = timeLine.style.transform;

  clockInner.style.transform = "none";
  if (timeLine) timeLine.style.transform = "none";

  const dateBounds = measureRowInkBounds(dateLine);
  const timeBounds = measureRowInkBounds(timeLine);

  clockInner.style.transform = savedClockInnerTransform;
  if (timeLine) timeLine.style.transform = savedTimeLineTransform;

  if (!dateBounds && !timeBounds) return null;

  // Grab the parameter context used during the last applyClockTransform layout run
  const params = window.lastTransformParams || {
    scale: 1,
    rotation: 0,
    hLocalOffset: 0,
    hOffsetVp: 0,
    vOffsetVp: 0,
    Cx: window.innerWidth / 2,
    Cy: window.innerHeight / 2
  };

  const transformedDateBounds = transformBounds(
    dateBounds,
    0,
    params.hOffsetVp,
    params.vOffsetVp,
    params.rotation,
    params.scale,
    params.Cx,
    params.Cy
  );

  const transformedTimeBounds = transformBounds(
    timeBounds,
    params.hLocalOffset,
    params.hOffsetVp,
    params.vOffsetVp,
    params.rotation,
    params.scale,
    params.Cx,
    params.Cy
  );

  return {
    dateBounds: transformedDateBounds,
    timeBounds: transformedTimeBounds
  };
}

function getVisualBlockHeight(dateLine, timeLine) {
  const dateBounds = getRenderedTextBounds(dateLine) || getChildrenVisualBounds(dateLine);
  const timeBounds = getRenderedTextBounds(timeLine) || getChildrenVisualBounds(timeLine);
  if (!dateBounds || !timeBounds) return 0;
  return Math.max(0, timeBounds.bottom - dateBounds.top);
}

let rowCoordinateUpdatePending = false;
let rowCoordinateRequestToken = 0;

function ensureDebugRowBox(id, label) {
  let box = document.getElementById(id);
  if (box) return box;

  box = document.createElement("div");
  box.id = id;
  box.className = "debug-row-box";
  box.setAttribute("aria-hidden", "true");

  const tag = document.createElement("span");
  tag.className = "debug-row-box-label";
  tag.textContent = label;
  box.appendChild(tag);

  document.body.appendChild(box);
  return box;
}

function updateDebugRowBox(box, bounds) {
  if (!box) return;
  if (!bounds) {
    box.style.display = "none";
    return;
  }

  box.style.display = "block";
  box.style.left = `${Math.round(bounds.left)}px`;
  box.style.top = `${Math.round(bounds.top)}px`;
  box.style.width = `${Math.max(0, Math.round(bounds.width))}px`;
  box.style.height = `${Math.max(0, Math.round(bounds.height))}px`;
}

function formatVisualBounds(bounds) {
  if (!bounds) return "n/a";
  return `${Math.round(bounds.left)},${Math.round(bounds.top)},${Math.round(bounds.width)},${Math.round(bounds.height)}`;
}

async function updateRowCoordinateDisplay() {
  const requestToken = ++rowCoordinateRequestToken;

  const dateDebugBox = ensureDebugRowBox("dateRowDebugBox", "date");
  const timeDebugBox = ensureDebugRowBox("timeRowDebugBox", "time");
  const display = document.getElementById("rowCoordinateDisplay");

  const showDebug = typeof state !== "undefined" && state.showDebug === true;
  if (!showDebug) {
    if (dateDebugBox) dateDebugBox.style.display = "none";
    if (timeDebugBox) timeDebugBox.style.display = "none";
    if (display) display.style.display = "none";
    return;
  }
  if (display) display.style.display = "";

  const dateLine = document.getElementById("dateLine");
  const timeLine = document.getElementById("timeLine");

  const preciseRowBounds = getClockRowInkBounds(dateLine, timeLine);
  if (requestToken !== rowCoordinateRequestToken) return;

  const dateBounds = preciseRowBounds?.dateBounds || getChildrenVisualBounds(dateLine) || getRenderedTextBounds(dateLine);
  const timeBounds = preciseRowBounds?.timeBounds || getChildrenVisualBounds(timeLine) || getRenderedTextBounds(timeLine);
  const gapHeight = getVisualGapPx(dateBounds, timeBounds);

  updateDebugRowBox(dateDebugBox, dateBounds);
  updateDebugRowBox(timeDebugBox, timeBounds);

  if (!display) return;

  const hourEl = document.getElementById("hour");
  const timeFontPx = hourEl ? Math.round(parseFloat(getComputedStyle(hourEl).fontSize)) : null;
  const timeFontFamily = hourEl ? getComputedStyle(hourEl).fontFamily.split(',')[0].trim().replace(/['"]/g, '') : "n/a";
  const simPart = cycleTimer !== null ? ` | sim ${(cycleStep - 1) % 40}` : "";
  display.textContent = `date ${formatVisualBounds(dateBounds)} | time ${formatVisualBounds(timeBounds)} | gap ${Number.isFinite(gapHeight) ? Math.round(gapHeight) : "n/a"} px | vwh ${window.innerWidth},${window.innerHeight} | time font ${timeFontFamily} ${timeFontPx !== null ? timeFontPx + " px" : "n/a"}${simPart}`;}

function scheduleRowCoordinateDisplayUpdate() {
  if (rowCoordinateUpdatePending) return;
  rowCoordinateUpdatePending = true;

  requestAnimationFrame(() => {
    rowCoordinateUpdatePending = false;
    void updateRowCoordinateDisplay();
  });
}

function requestLayoutAfterFonts(fontFamilies) {
  if (!document.fonts || typeof document.fonts.load !== "function") return;

  const families = [...new Set((fontFamilies || [])
    .map(v => String(v || "").trim())
    .filter(Boolean))];
  if (!families.length) return;

  const clock = document.getElementById("clock");
  // Check if any of the target fonts are not fully loaded yet.
  // If there are unloaded fonts, temporarily hide the clock
  // so we don't display a mismatched, horribly unaligned layout
  // with fallback monospace fonts.
  const anyUnloaded = families.some(family => !document.fonts.check(`120px "${family}"`));
  if (anyUnloaded && clock) {
    clock.style.visibility = "hidden";
  }

  const token = ++fontLayoutRequestToken;
  Promise.all(families.map(family =>
    document.fonts.load(`120px "${family}"`).catch(() => null)
  )).then(() => {
    if (token !== fontLayoutRequestToken) return;
    updateClock();
    applyClockTransform();
    scheduleRowCoordinateDisplayUpdate();
    if (clock && anyUnloaded) {
      // Allow browser single-frame settling, then make visible
      requestAnimationFrame(() => {
        clock.style.visibility = "visible";
      });
    }
  });
}

window.requestLayoutAfterFonts = requestLayoutAfterFonts;

function activateConfigurationMode() {
  if (typeof window.toggleConfigUI === "function") window.toggleConfigUI();
}

function toggleDebugMode() {
  if (typeof state === "undefined") return;
  state.showDebug = !state.showDebug;
  if (typeof saveShowDebug === "function") saveShowDebug(state.showDebug);
  
  // Update the checkbox if it exists in the config UI
  const showDebugCheckbox = document.getElementById("showDebug");
  if (showDebugCheckbox) showDebugCheckbox.checked = state.showDebug;
  
  scheduleRowCoordinateDisplayUpdate();
}

function cycleFont(direction = 1) {
  const numericFontSelect = document.getElementById("numericFontSelect");
  if (!numericFontSelect || numericFontSelect.options.length === 0) return;
  
  const currentIndex = numericFontSelect.selectedIndex;
  const totalOptions = numericFontSelect.options.length;
  const nextIndex = (currentIndex + direction + totalOptions) % totalOptions;
  numericFontSelect.selectedIndex = nextIndex;
  
  // Trigger input event to apply the change
  numericFontSelect.dispatchEvent(new Event("input", { bubbles: true }));
}

function cycleProfile(direction = 1) {
  const profileSelect = document.getElementById("profileSelect");
  if (!profileSelect || profileSelect.options.length === 0) return;

  const currentIndex = profileSelect.selectedIndex;
  const totalOptions = profileSelect.options.length;
  const nextIndex = (currentIndex + direction + totalOptions) % totalOptions;
  profileSelect.selectedIndex = nextIndex;

  // Trigger change/input handlers to load the selected profile.
  profileSelect.dispatchEvent(new Event("change", { bubbles: true }));
}

function stopDigitCycle() {
  if (!cycleTimer) return;
  clearInterval(cycleTimer);
  cycleTimer = null;
  simulationHour = null;
}

function applyDigitCycleStep() {
  const digit = String(cycleStep % 10);
  const mode = Math.floor(cycleStep / 10) % 4;
  simulationDigit = digit;
  simulationWeekday = simulatedWeekdays[cycleStep % simulatedWeekdays.length];
  simulationMonth = months[cycleStep % months.length];
  if (mode === 0) simulationHour = "0" + digit;
  else if (mode === 1) simulationHour = "1" + digit;
  else if (mode === 2) simulationHour = "1";
  else simulationHour = " 1";
  cycleStep += 1;

  updateClock();
  applyClockTransform();
}

function startDigitCycle() {
  stopDigitCycle();
  cycleStep = 0;
  applyDigitCycleStep();
  cycleTimer = setInterval(applyDigitCycleStep, 200);
}

function ensureTimeScaleProbe() {
  if (timeScaleProbe) return timeScaleProbe;

  const probe = document.createElement("div");
  probe.id = "timeScaleProbe";
  probe.innerHTML = `
    <span class="numeric-group">${wrapDigits("88")}</span>
    <span class="colon-group probe-colon-min">${wrapDigits(":")}</span>
    <span class="numeric-group">${wrapDigits("88")}</span>
    <span class="colon-group probe-colon-sec probe-sec">${wrapDigits(":")}</span>
    <span class="numeric-group probe-sec">${wrapDigits("88")}</span>
  `;

  document.body.appendChild(probe);
  timeScaleProbe = probe;
  return timeScaleProbe;
}

function getWorstCaseTimeWidth() {
  const probe = ensureTimeScaleProbe();
  if (!probe) {
    const timeLine = document.getElementById("timeLine");
    return timeLine ? timeLine.offsetWidth : 0;
  }
  // Use probe INK width (not element box) so the scale is calibrated to the
  // actual glyph ink filling the viewport, not the character cells.
  const probeBounds = measureRowInkBounds(probe);
  return probeBounds && probeBounds.width > 0 ? probeBounds.width : (probe.offsetWidth || 0);
}

// Helper function to wrap each character in a fixed-width span
// Only applies to sequences containing only 0-9, :, and .
function wrapDigits(str, alphaSubstitution = false) {
  let result = str;
  
  // Replace 0s with Os if numeric font has o40 flag set
  if (window.clockSizeCorrection && window.clockSizeCorrection.o40) {
    result = result.replace(/0/g, 'O');
  }
  // Replace Ss with 5s for alpha date text if alpha font has o40 flag set
  if (alphaSubstitution && window.clockSizeCorrection && window.clockSizeCorrection.alphaO40) {
    result = result.replace(/S/g, '5');
  }
  
  // Check if font has excludeMonoTweaks enabled
  if (window.clockSizeCorrection && window.clockSizeCorrection.excludeMonoTweaks) {
    return result;
  }
  
  // Check if string contains only allowed characters (including O if o40 is enabled)
  const pattern = window.clockSizeCorrection && window.clockSizeCorrection.o40 
    ? /^[0-9.:O]+$/ 
    : /^[0-9.:]+$/;
  
  if (pattern.test(result)) {
    return Array.from(result).map(char => {
      // Use different class for colons and dots
      const className = /[:.]/.test(char) ? 'colon-dot-char' : 'digit-char';
      return `<span class="${className}">${char}</span>`;
    }).join('');
  }
  
  // If other characters present, return as-is
  return result;
}

function updateClock() {
    const now = new Date(Date.now() + (window.__timeMasterOffsetMs || 0));
  const hRaw = typeof state !== "undefined" && state.padHours
    ? String(now.getHours()).padStart(2, "0")
    : String(now.getHours());
  const mRaw = String(now.getMinutes()).padStart(2, "0");
  const sRaw = String(now.getSeconds()).padStart(2, "0");
  const dRaw = String(now.getDate()).padStart(2, "0");
  const monthRaw = months[now.getMonth()];
  const yRaw = String(now.getFullYear());
  const h = (simulationHour !== null ? simulationHour : (simulationDigit ? simulationDigit.repeat(2) : hRaw)).trim();
  const m = simulationDigit ? simulationDigit.repeat(2) : mRaw;
  const s = simulationDigit ? simulationDigit.repeat(2) : sRaw;
  const d = simulationDigit ? simulationDigit.repeat(2) : dRaw;
  const month = simulationMonth || monthRaw;
  const y = simulationDigit ? simulationDigit.repeat(yRaw.length) : yRaw;

  const timeLine = document.getElementById("timeLine");

    document.getElementById("hour").innerHTML      = wrapDigits(h);
    document.getElementById("colon-min").innerHTML = wrapDigits(":");
    document.getElementById("minute").innerHTML    = wrapDigits(m);
    document.getElementById("colon-sec").innerHTML = wrapDigits(":");
    document.getElementById("sec").innerHTML       = wrapDigits(s);

    document.getElementById("weekday").innerHTML  = wrapDigits(simulationWeekday || days[now.getDay()], true);
    document.getElementById("day").innerHTML      = wrapDigits(d);
    document.getElementById("month").innerHTML    = wrapDigits(month, true);
    document.getElementById("year").innerHTML     = wrapDigits(y);

    if (timeLine) {
      const hourLeadingOne = h.length === 2 && h.startsWith("1");
      timeLine.classList.toggle("hour-leading-one", hourLeadingOne);
    }

    scheduleRowCoordinateDisplayUpdate();

}

function setSimulationModeByKey(key) {
  stopDigitCycle();

  if (key >= "1" && key <= "8") {
    simulationDigit = key;
    if (key <= "7") {
      simulationWeekday = simulatedWeekdays[Number(key) - 1];
      simulationMonth = simulatedMonths[Number(key) - 1];
    } else {
      simulationWeekday = null;
      simulationMonth = null;
    }
  } else if (key === "0") {
    simulationDigit = null;
    simulationWeekday = null;
    simulationMonth = null;
  } else {
    return;
  }

  updateClock();
  applyClockTransform();
}

function handleKeyDown(e) {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.key === "Control" || e.key === "Alt" || e.key === "Meta" || e.key === "Shift") return;
  const t = e.target;
  if (t && (t.tagName === "TEXTAREA" || (t.tagName === "INPUT" && t.type !== "checkbox" && t.type !== "range" && t.type !== "color"))) return;
  const key = e.key;
  if (key === "x" || key === "X") {
    activateConfigurationMode();
    return;
  }

  if (key === "d" || key === "D") {
    toggleDebugMode();
    return;
  }

  if (key === "f" || key === "F") {
    cycleFont(key === "f" ? 1 : -1);
    return;
  }

  if (key === "p" || key === "P") {
    cycleProfile(key === "p" ? 1 : -1);
    return;
  }

  if (key === "r" || key === "R") {
    rotateClock();
    return;
  }

  if (key === "9") {
    startDigitCycle();
    return;
  }

  if (key === " ") {
    setSimulationModeByKey("0");
    return;
  }

  setSimulationModeByKey(key);
}

let rotation = 0;
try {
  const storedRotation = localStorage.getItem("screenClock_rotation");
  if (storedRotation !== null) {
    rotation = parseInt(storedRotation, 10) || 0;
  }
} catch (e) {
  console.warn("Failed to load rotation", e);
}

function saveRotationState() {
  try {
    localStorage.setItem("screenClock_rotation", rotation);
  } catch (e) {
    console.warn("Failed to save rotation", e);
  }
}
function applyClockTransform(animated = false) {
  const clock = document.getElementById("clock");
  const clockInner = document.getElementById("clockInner");
  const dateLine = document.getElementById("dateLine");
  const timeLine = document.getElementById("timeLine");
  const hourEl = document.getElementById("hour");
  const minuteEl = document.getElementById("minute");
  const colonMinEl = document.getElementById("colon-min");
  const secEl = document.getElementById("sec");
  const colonSecEl = document.getElementById("colon-sec");
  if (!clock || !clockInner) return;

  // Always compute fit and spacing in untransformed layout space.
  clockInner.style.transform = "none";
  clockInner.style.paddingTop = "0px";
  clockInner.style.paddingBottom = "0px";
  clockInner.style.rowGap = "0px";
  if (timeLine) timeLine.style.marginTop = "0px";

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const currentState = typeof state !== "undefined" ? state : {};
  const sizeBudget = Number.isFinite(currentState.sizeBudget) && currentState.sizeBudget > 0 ? currentState.sizeBudget : SIZE_BUDGET;
  const baseSizing = computeSizingWeights(
    dateLine ? dateLine.dataset.weightGap : undefined,
    dateLine ? dateLine.dataset.fr : undefined
  );
  const corrections = typeof window.clockSizeCorrection === "object" && window.clockSizeCorrection
    ? window.clockSizeCorrection
    : { numeric: 1, alpha: 1 };
  const numericCorrection = Math.max(Number(corrections.numeric) || 1, 0.01);
  const alphaCorrection = Math.max(Number(corrections.alpha) || 1, 0.01);
  const gapAdjust = Math.max(Number(corrections.gapAdjust) || 1, 0);
  const adjustedGapWeightRaw = baseSizing.weightGap * gapAdjust;
  const adjustedGapWeight = Number.isFinite(adjustedGapWeightRaw)
    ? Math.min(0.99, Math.max(0, adjustedGapWeightRaw))
    : baseSizing.weightGap;
  const adjustedRemaining = Math.max(0, 1 - adjustedGapWeight);
  const sizing = {
    weightGap: adjustedGapWeight,
    fr: baseSizing.fr,
    weightDate: baseSizing.fr * (adjustedRemaining / (baseSizing.fr + 1)),
    weightTime: adjustedRemaining / (baseSizing.fr + 1)
  };

  const availableHeight = sizeBudget * vh;
  const renderedDateFontSize = availableHeight * sizing.weightDate;
  const renderedTimeFontSize = availableHeight * sizing.weightTime;
  const secFontFactor = Number(currentState.secFontFactor);
  const renderedSecFontSize = renderedTimeFontSize * (Number.isFinite(secFontFactor) && secFontFactor > 0 ? secFontFactor : 0.625);

  if (dateLine) {
    dateLine.style.fontSize = `${renderedDateFontSize / alphaCorrection}px`;
    dateLine.style.marginBottom = "0px";
  }

  if (timeLine) {
    timeLine.style.marginTop = "0px";
    timeLine.style.fontSize = `${renderedTimeFontSize / numericCorrection}px`;
    // Neutralise CSS hour-leading-one rule and any previous frame's correction;
    // will be recomputed after scale is applied below.
    timeLine.style.transform = "translateX(0)";
  }

  if (hourEl) hourEl.style.fontSize = `${renderedTimeFontSize / numericCorrection}px`;
  if (minuteEl) minuteEl.style.fontSize = `${renderedTimeFontSize / numericCorrection}px`;
  if (colonMinEl) colonMinEl.style.fontSize = `${renderedTimeFontSize / numericCorrection}px`;
  if (secEl) secEl.style.fontSize = `${renderedSecFontSize / numericCorrection}px`;
  if (colonSecEl) colonSecEl.style.fontSize = `${renderedSecFontSize / numericCorrection}px`;

  const probe = ensureTimeScaleProbe();
  const probeMainChars = probe ? probe.querySelectorAll(".numeric-group:not(.probe-sec)") : [];
  const probeSecChars = probe ? probe.querySelectorAll(".probe-sec") : [];
  probeMainChars.forEach(el => {
    el.style.fontSize = `${renderedTimeFontSize / numericCorrection}px`;
  });
  probeSecChars.forEach(el => {
    el.style.fontSize = `${renderedSecFontSize / numericCorrection}px`;
  });

  // Measure the natural ink gap between date and time when their boxes are
  // flush (marginTop = 0).  This is the whitespace that comes from the font's
  // internal leading — the ink doesn't fill the full line box.  Subtracting it
  // from marginTop lets gapWeight=0 produce a true 0 px visual ink gap.
  // clockInner.style.transform is already "none" here, so getBoundingClientRect
  // inside measureRowInkBounds returns clean layout-space coordinates.
  let naturalInkGap = 0;
  let _di = null;
  let _ti = null;
  if (dateLine && timeLine) {
    _di = measureRowInkBounds(dateLine);
    _ti = measureRowInkBounds(timeLine);
    if (_di && _ti) naturalInkGap = Math.max(0, _ti.top - _di.bottom);
  }

  // Gap: visual ink gap = gapWeight × vh.  marginTop is adjusted so that at
  // gapWeight=0 the ink edges touch (marginTop goes slightly negative to cancel
  // the natural font whitespace).
  const targetGap = baseSizing.weightGap * vh;
  const marginTopPx = targetGap - naturalInkGap;
  if (timeLine) {
    timeLine.style.marginTop = `${marginTopPx}px`;
  }

  // Heights and widths in CSS layout space (offsetWidth/Height are unaffected
  // by CSS transforms on the element itself).
  const dateH = dateLine ? dateLine.offsetHeight : 0;
  const timeH = timeLine ? timeLine.offsetHeight : 0;
  const totalInkH = dateH + marginTopPx + timeH;

  // Width: worst-case time row width from the out-of-tree probe (already in CSS
  // px since the probe has no transform) vs live element layout widths.
  const dateW = dateLine ? dateLine.offsetWidth : 0;
  const timeW = timeLine ? timeLine.offsetWidth : 0;
  const maxRowW = Math.max(dateW, timeW, getWorstCaseTimeWidth());

  // Scale: satisfy BOTH width and height constraints simultaneously.
  // min(hScale, vScale) ensures the content never overflows the viewport in
  // either dimension — critical in portrait/narrow aspect ratios where a
  // purely horizontal fit would make the total height overflow.
  const orientation = ((rotation % 360) + 360) % 360;
  let scale = 1;
  if (maxRowW > 0 && totalInkH > 0) {
    if (orientation % 180 === 0) {
      scale = Math.min((sizeBudget * vw) / maxRowW, (sizeBudget * vh) / totalInkH);
    } else {
      scale = Math.min((sizeBudget * vh) / maxRowW, (sizeBudget * vw) / totalInkH);
    }
  } else {
    scale = Math.min(1, vw / (maxRowW || vw), vh / (totalInkH || vh));
    scale *= SCALE_SAFETY;
  }

  // Calculate unrotated centering parameters using layout-space positions.
  // clockInner.style.transform is "none" at this point, so offsetLeft/Top on
  // children give clean CSS-px positions relative to the viewport origin.
  let hLocalOffset = 0;
  let hOffsetVp = 0;
  let vOffsetVp = 0;

  if (timeLine && currentState.recenterLeadingOne === true && _ti) {
    // Center the actual ink horizontally, not the element box.
    // Scale is around vw/2 (clockInner center = viewport center), so a
    // layout-space shift of (vw/2 - inkCenter) maps exactly to viewport center
    // regardless of the current scale factor.
    const inkCenterX = (_ti.left + _ti.right) / 2;
    hLocalOffset = (vw / 2) - inkCenterX;
  }

  const theta = rotation * Math.PI / 180;
  if (_di && _ti) {
    // Center on the ink midpoint rather than the element-box midpoint.  _di/_ti
    // were measured at marginTop=0; the ink midpoint is invariant to the
    // marginTopPx shift applied below because flex recentering of clockInner
    // absorbs it exactly, so (_di.top + _ti.bottom)/2 is correct for any gap.
    const inkCenterY = (_di.top + _ti.bottom) / 2;
    const vOffset = (vh / 2) - inkCenterY;
    hOffsetVp = -vOffset * scale * Math.sin(theta);
    vOffsetVp = vOffset * scale * Math.cos(theta);
  } else {
    const blockTop = dateLine ? dateLine.offsetTop : (timeLine ? timeLine.offsetTop : 0);
    const blockBottom = timeLine ? (timeLine.offsetTop + timeLine.offsetHeight) : (dateLine ? dateLine.offsetTop + dateLine.offsetHeight : 0);
    if (blockBottom > blockTop) {
      const blockCenterY = (blockTop + blockBottom) / 2;
      const vOffset = (vh / 2) - blockCenterY;
      hOffsetVp = -vOffset * scale * Math.sin(theta);
      vOffsetVp = vOffset * scale * Math.cos(theta);
    }
  }

  // Save layout context params for getClockRowInkBounds
  window.lastTransformParams = {
    scale,
    rotation,
    hLocalOffset,
    hOffsetVp,
    vOffsetVp,
    Cx: vw / 2,
    Cy: vh / 2
  };

  // Suppress transition timing if not animated to avoid visual jumping or lag on routine tick updates.
  const shouldAnimate = animated === true;
  if (!shouldAnimate) {
    clockInner.style.transition = "none";
    if (timeLine) timeLine.style.transition = "none";
  }

  // Apply high precision unrotated horizontal translation local to timeLine
  if (timeLine) {
    timeLine.style.transform = `translateX(${hLocalOffset}px)`;
  }

  // Apply unified physical scale, rotation & viewport coordinates offset transform
  clockInner.style.transform = `translateX(${hOffsetVp}px) translateY(${vOffsetVp}px) rotate(${rotation}deg) scale(${scale})`;

  if (!shouldAnimate) {
    void clockInner.offsetWidth; // force style recalculation
    clockInner.style.transition = "";
    if (timeLine) timeLine.style.transition = "";
  }

  scheduleRowCoordinateDisplayUpdate();
}

let lastRotationTime = 0;
function rotateClock() {
  const now = Date.now();
  if (now - lastRotationTime < 350) return;
  lastRotationTime = now;
  rotation += 90;
  saveRotationState();
  applyClockTransform(true);
}

function normalizeRotationIfNeeded() {
  const clockInner = document.getElementById("clockInner");
  if (!clockInner) return;

  const normalized = ((rotation % 360) + 360) % 360;
  if (normalized !== 0 || rotation === 0) return;

  // Snap 360, 720, ... back to 0 without an extra animated jump.
  clockInner.style.transition = "none";
  rotation = 0;
  saveRotationState();
  applyClockTransform();
  void clockInner.offsetWidth;
  clockInner.style.transition = "";
}

async function toggleFullscreen() {
  const doc = document;
  const docEl = document.documentElement;

  const isFull =
    doc.fullscreenElement ||
    doc.webkitFullscreenElement ||
    doc.msFullscreenElement;

  if (isFull) {
    if (doc.exitFullscreen) await doc.exitFullscreen();
    else if (doc.webkitExitFullscreen) doc.webkitExitFullscreen();
    else if (doc.msExitFullscreen) doc.msExitFullscreen();
    return;
  }

  if (docEl.requestFullscreen) await docEl.requestFullscreen();
  else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
  else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
  else console.warn("Fullscreen API not supported on this device/browser");
}

let lastRenderSecond = -1;
function tick() {
  const nowMs = Date.now() + (window.__timeMasterOffsetMs || 0);
  const nowSec = Math.floor(nowMs / 1000);
  if (nowSec !== lastRenderSecond) {
    lastRenderSecond = nowSec;
    updateClock();
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
applyClockTransform();
document.getElementById("year").addEventListener("click", toggleFullscreen);
(function() {
  const el = document.getElementById("weekday");
  
  function isTapOnWeekday(clientX, clientY) {
    const rect = el.getBoundingClientRect();
    if (!rect || rect.width === 0 || rect.height === 0) return false;
    // Pad the bounding rect of `#weekday` to make tapping extremely forgiving and robust
    const padX = 40;
    const padY = 40;
    return (
      clientX >= rect.left - padX &&
      clientX <= rect.right + padX &&
      clientY >= rect.top - padY &&
      clientY <= rect.bottom + padY
    );
  }

  function handleInteraction(clientX, clientY, e) {
    if (isTapOnWeekday(clientX, clientY)) {
      e.stopPropagation();
      e.preventDefault();
      rotateClock();
      return true;
    }
    return false;
  }

  // Click handler
  window.addEventListener("click", function(e) {
    if (e.target.id === "menuButton" || document.getElementById("menuPanel")?.contains(e.target)) {
      return;
    }
    handleInteraction(e.clientX, e.clientY, e);
  }, { capture: true });

  // Touch handler (handles immediate physical taps on Android)
  window.addEventListener("touchend", function(e) {
    if (e.target.id === "menuButton" || document.getElementById("menuPanel")?.contains(e.target)) {
      return;
    }
    if (e.changedTouches && e.changedTouches.length > 0) {
      const touch = e.changedTouches[0];
      handleInteraction(touch.clientX, touch.clientY, e);
    }
  }, { capture: true, passive: false });
})();
document.getElementById("sec").addEventListener("click", activateConfigurationMode);
window.addEventListener("resize", applyClockTransform);
window.addEventListener("orientationchange", applyClockTransform);
document.addEventListener("contextmenu", e => { e.preventDefault(); });
window.addEventListener("keydown", handleKeyDown);

if (document.fonts && typeof document.fonts.addEventListener === "function") {
  document.fonts.addEventListener("loadingdone", () => {
    const clock = document.getElementById("clock");
    if (!clock || getComputedStyle(clock).display === "none") return;

    // Late webfont resolution can shift glyph geometry after initial layout.
    // Re-apply transform so reload reaches the same settled state as resize.
    applyClockTransform();
    scheduleRowCoordinateDisplayUpdate();
  });
}

(async function showClockWhenFontReady() {
  if (document.readyState !== "complete") {
    await new Promise(resolve =>
      window.addEventListener("load", resolve, { once: true })
    );
  }

  const fontNames = new Set(["Digital7Mono"]);
  if (typeof state === "object" && state) {
    if (state.numericFont) fontNames.add(state.numericFont);
    if (state.alphaFont) fontNames.add(state.alphaFont);
  }

  if (document.fonts && typeof document.fonts.load === "function") {
    for (const fontName of fontNames) {
      try {
        await document.fonts.load(`80px "${fontName}"`);
      } catch (e) {
        console.warn(`Font load error for ${fontName}:`, e);
      }
    }

    try {
      await Promise.race([
        document.fonts.ready,
        new Promise(resolve => setTimeout(resolve, 1500))
      ]);
    } catch (e) {
      console.warn("document.fonts.ready error:", e);
    }
  }

  const configFontsReadyPromise = window.configurationFontsReadyPromise;
  if (configFontsReadyPromise && typeof configFontsReadyPromise.then === "function") {
    try {
      await Promise.race([
        configFontsReadyPromise,
        new Promise(resolve => setTimeout(resolve, 1500))
      ]);
    } catch (e) {
      console.warn("configurationFontsReadyPromise error:", e);
    }
  }

  const clock = document.getElementById("clock");
  if (clock) {
    clock.style.visibility = "hidden";
    clock.style.display = "flex";
    applyClockTransform();

    await new Promise(resolve => setTimeout(resolve, 350));
    applyClockTransform();

    clock.style.visibility = "visible";
  }
  scheduleRowCoordinateDisplayUpdate();
})();

document.getElementById("rowCoordinateDisplay").addEventListener("click", function() {
  const text = this.textContent;
  if (!text) return;

  function showToast(msg) {
    let toast = document.getElementById("debugCopyToast");
    if (!toast) {
      toast = document.createElement("div");
      toast.id = "debugCopyToast";
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add("visible");
    clearTimeout(toast._hideTimer);
    toast._hideTimer = setTimeout(() => toast.classList.remove("visible"), 1400);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast("copied"), () => showToast("copy failed"));
  } else {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      showToast("copied");
    } catch { showToast("copy failed"); }
  }
});
