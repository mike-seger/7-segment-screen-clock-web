<script>
// Patch getContext so all 2d contexts (including html2canvas internals) get
// willReadFrequently=true, suppressing the repeated DevTools perf warning.
(function() {
  const _orig = HTMLCanvasElement.prototype.getContext;
  HTMLCanvasElement.prototype.getContext = function(type, attrs) {
    if (type === "2d") attrs = Object.assign({ willReadFrequently: true }, attrs);
    return _orig.call(this, type, attrs);
  };
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>
const days   = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const simulatedWeekdays = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
const simulatedMonths = ["JAN","FEB","MAR","APR","MAY","JUN","JUL"];
let simulationDigit = null;
let simulationWeekday = null;
let simulationMonth = null;
let simulationHour = null;
let timeScaleProbe = null;
let cycleTimer = null;
let cycleStep = 0;
let fontLayoutRequestToken = 0;

const SIZE_BUDGET = 0.95;
const SCALE_SAFETY = 0.98;
const DEFAULT_WEIGHT_GAP = 0.07;
const DEFAULT_FONT_RATIO = 0.07;

function normalizeSizingWeight(value, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.min(0.99, Math.max(0, n));
}

// Returns the real clock viewport size. The simulated-display feature works
// purely by capturing the rendered clock and downsampling, so layout always
// targets the real window dimensions.
function getClockViewportSize() {
  const override = window._virtualViewportOverride;
  if (override && Number.isFinite(override.vw) && Number.isFinite(override.vh)) {
    return {
      vw: Math.max(1, Math.round(override.vw)),
      vh: Math.max(1, Math.round(override.vh))
    };
  }
  return { vw: window.innerWidth, vh: window.innerHeight };
}

let _externalSimWindow = null;
let _externalPopupBlocked = false;
let _simClosingProgrammatically = false;
let _simClosingProgrammaticallyTimer = null;
const SIM_POPUP_POS_KEY = "screenClock_simPopupPos";

function loadSimPopupPosition() {
  try {
    const raw = localStorage.getItem(SIM_POPUP_POS_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      if (Number.isFinite(p.left) && Number.isFinite(p.top)) return p;
    }
  } catch {}
  return null;
}

function saveSimPopupPosition() {
  if (!_externalSimWindow || _externalSimWindow.closed) return;
  try {
    const left = _externalSimWindow.screenX;
    const top = _externalSimWindow.screenY;
    if (Number.isFinite(left) && Number.isFinite(top)) {
      localStorage.setItem(SIM_POPUP_POS_KEY, JSON.stringify({ left, top }));
    }
  } catch {}
}

window.__onExternalSimPopupClosed = function() {
  if (_simClosingProgrammatically) return;
  _externalSimWindow = null;
  // User closed the popup via the OS window close button — uncheck the checkbox.
  const cb = document.getElementById("containerEnabled");
  if (cb && cb.checked) {
    cb.checked = false;
    cb.dispatchEvent(new Event("change"));
  }
};

function prefersExternalSimulationPopup() {
  try {
    const ua = navigator.userAgent || "";
    const isMobileUA = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile/i.test(ua);
    if (isMobileUA) return false;
    // Electron embeds its version in the UA string — always treat it as a
    // desktop environment with a fine pointer.
    if (/Electron\//.test(ua)) return true;
    const hasFinePointer = window.matchMedia && window.matchMedia("(hover: hover) and (pointer: fine)").matches;
    return !!hasFinePointer;
  } catch {
    return false;
  }
}

function getExternalPopupFeatures(vw, vh, sc) {
  // width/height in window.open features are the inner content area in Chrome/modern browsers.
  // Pass the canvas dimensions directly so the body area matches vw×vh exactly.
  const rawW = Math.round(vw * sc);
  const rawH = Math.round(vh * sc);
  const maxW = Math.max(320, (window.screen && window.screen.availWidth ? window.screen.availWidth : 1280) - 40);
  const maxH = Math.max(240, (window.screen && window.screen.availHeight ? window.screen.availHeight : 800) - 60);
  const width = Math.max(320, Math.min(rawW, maxW));
  const height = Math.max(240, Math.min(rawH, maxH));
  let features = `popup=yes,resizable=no,scrollbars=no,toolbar=no,menubar=no,location=no,status=no,width=${width},height=${height}`;
  const pos = loadSimPopupPosition();
  if (pos) features += `,left=${pos.left},top=${pos.top}`;
  return features;
}

function initializeExternalPopupDocument(popupWin) {
  if (!popupWin || popupWin.closed) return;
  const doc = popupWin.document;
  if (!doc) return;
  if (doc.getElementById("virtualClockCanvasExternal")) return;

  // Set title
  doc.title = "Simulated Display";

  // Configure head with viewport meta
  let metaViewport = doc.querySelector('meta[name="viewport"]');
  if (!metaViewport) {
    metaViewport = doc.createElement("meta");
    metaViewport.name = "viewport";
    metaViewport.content = "width=device-width, initial-scale=1.0";
    doc.head.appendChild(metaViewport);
  }

  // Configure head with charset meta if missing
  let metaCharset = doc.querySelector("meta[charset]");
  if (!metaCharset) {
    metaCharset = doc.createElement("meta");
    metaCharset.setAttribute("charset", "UTF-8");
    doc.head.appendChild(metaCharset);
  }

  const style = doc.createElement("style");
  style.textContent = [
    "html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }",
    "body { display: flex; flex-direction: column; }",
    ".wrap { flex: 1 1 auto; display: flex; align-items: flex-start; justify-content: flex-start; overflow: hidden; background: #000; }",
    "canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; background: #000; }"
  ].join("\n");
  doc.head.appendChild(style);

  const wrap = doc.createElement("div");
  wrap.className = "wrap";

  const canvas = doc.createElement("canvas");
  canvas.id = "virtualClockCanvasExternal";
  wrap.appendChild(canvas);

  doc.body.appendChild(wrap);
}

function bindExternalPopupHandlers(popupWin) {
  if (!popupWin || popupWin.closed) return;
  if (popupWin.__screenClockHandlersBound) return;
  popupWin.__screenClockHandlersBound = true;

  const notifyClose = () => {
    if (typeof window.__onExternalSimPopupClosed === "function") {
      window.__onExternalSimPopupClosed();
    }
  };

  try {
    popupWin.addEventListener("beforeunload", notifyClose);
  } catch {}
}

// Open a fresh simulation popup, closing any existing one first.
function openSimulationPopup(vw, vh, sc) {
  // Save position of the existing popup before closing it.
  if (_externalSimWindow && !_externalSimWindow.closed) {
    saveSimPopupPosition();
    clearTimeout(_simClosingProgrammaticallyTimer);
    _simClosingProgrammatically = true;
    try { _externalSimWindow.close(); } catch {}
    _externalSimWindow = null;
    _simClosingProgrammaticallyTimer = setTimeout(() => { _simClosingProgrammatically = false; }, 200);
  } else {
    _externalSimWindow = null;
  }
  _externalPopupBlocked = false;

  // Open a self-contained HTML page so no cross-window DOM manipulation is
  // needed — this is reliable in both browsers and Electron (where
  // window.open("about:blank") opens fine but document access from the opener
  // is restricted by context isolation).
  const popupUrl = (function() {
    try {
      // Resolve relative to the current page so it works under any origin
      // (file://, http://localhost:8080, etc.).
      return new URL("sim-popup.html", location.href).href;
    } catch { return "sim-popup.html"; }
  })();
  const newWin = window.open(popupUrl, "screenClockSimulationPopup", getExternalPopupFeatures(vw, vh, sc));
  if (!newWin) {
    _externalPopupBlocked = true;
    clearTimeout(_simClosingProgrammaticallyTimer);
    _simClosingProgrammatically = false;
    return null;
  }
  _externalSimWindow = newWin;
  bindExternalPopupHandlers(_externalSimWindow);

  // Browsers disagree about whether `width`/`height` in window.open features
  // refer to inner content area or outer window box.  Measure the actual inner
  // size after the popup is open and resize to compensate for chrome delta.
  const targetInnerW = Math.round(vw * sc);
  const targetInnerH = Math.round(vh * sc);
  const correctPopupInnerSize = () => {
    if (!_externalSimWindow || _externalSimWindow.closed) return;
    try {
      const innerW = _externalSimWindow.innerWidth;
      const innerH = _externalSimWindow.innerHeight;
      if (innerW > 0 && innerH > 0) {
        const dw = targetInnerW - innerW;
        const dh = targetInnerH - innerH;
        if (Math.abs(dw) >= 1 || Math.abs(dh) >= 1) {
          _externalSimWindow.resizeBy(dw, dh);
        }
      }
    } catch {}
  };
  // Run size correction after the popup page has loaded.
  const scheduleCorrection = () => {
    correctPopupInnerSize();
    setTimeout(correctPopupInnerSize, 50);
  };
  try {
    if (_externalSimWindow.document && _externalSimWindow.document.readyState === 'complete') {
      scheduleCorrection();
    } else {
      _externalSimWindow.addEventListener('load', scheduleCorrection);
    }
  } catch {
    setTimeout(scheduleCorrection, 200);
  }

  // Return the window object (not the canvas — the page may still be loading).
  // drawClockToCanvas / getActiveSimulationCanvas will find the canvas once
  // the page has finished loading.
  return newWin;
}

function closeExternalSimulationPopup() {
  if (_externalSimWindow && !_externalSimWindow.closed) {
    saveSimPopupPosition();
    clearTimeout(_simClosingProgrammaticallyTimer);
    _simClosingProgrammatically = true;
    try { _externalSimWindow.close(); } catch {}
    _simClosingProgrammaticallyTimer = setTimeout(() => { _simClosingProgrammatically = false; }, 200);
  }
  _externalSimWindow = null;
  _externalPopupBlocked = false;
}

// Returns the canvas in the existing popup window (does NOT open a new one).
function getActiveSimulationCanvas() {
  if (!_externalSimWindow || _externalSimWindow.closed) return null;
  try {
    return _externalSimWindow.document.getElementById("virtualClockCanvasExternal") || null;
  } catch {
    return null;
  }
}

function applyContainerMode() {
  const c = (typeof state !== "undefined" && state.container) ? state.container : null;
  const enabled = !!(c && c.enabled);
  if (enabled) {
    if (!prefersExternalSimulationPopup()) return;
    const sc = Math.max(1, c.scale || 4);
    const vw = Math.max(10, Math.round(c.width || 240));
    const vh = Math.max(10, Math.round(c.height || 135));

    // Open popup if not already showing; otherwise just redraw.
    if (!_externalSimWindow || _externalSimWindow.closed) {
      const opened = openSimulationPopup(vw, vh, sc);
      if (!opened) {
        // Browser/Electron blocked the popup — reset UI.
        if (c) c.enabled = false;
        const cb = document.getElementById("containerEnabled");
        if (cb && cb.checked) { cb.checked = false; cb.dispatchEvent(new Event("change")); }
        return;
      }
    }
    drawClockToCanvas();
  } else {
    closeExternalSimulationPopup();
  }
}

// Close simulation popup when the main page is reloaded or closed.
window.addEventListener("beforeunload", () => {
  if (_externalSimWindow && !_externalSimWindow.closed) {
    saveSimPopupPosition();
    try { _externalSimWindow.close(); } catch {}
  }
});

// Renders the simulation canvas by temporarily re-laying out the clock for
// vw×vh, snapshotting font sizes / margins synchronously, then restoring the
// real layout before any browser paint (no visible flash).
//
// Key insight: html2canvas is told windowWidth=vw, windowHeight=vh.  In the
// clone iframe, #clock is position:fixed 100%×100% = vw×vh, so flexbox
// centers #clockInner at (vw/2, vh/2).  The virtual font sizes fill that
// space exactly, and we only need scale+rotation — no viewport-relative
// translation correction.
let _drawScheduled = false;
let _drawInFlight = false;
let _drawQueued = false;
function drawClockToCanvas() {
  if (window._suppressCanvasDraw) return;
  const c = (typeof state !== "undefined" && state.container) ? state.container : null;
  const canvas = getActiveSimulationCanvas();
  if (!canvas) return;
  if (!c || !c.enabled) return;
  if (typeof html2canvas !== "function") return;
  if (_drawInFlight) {
    _drawQueued = true;
    return;
  }
  if (_drawScheduled) return;
  _drawScheduled = true;
  requestAnimationFrame(() => {
    _drawScheduled = false;
    if (window._suppressCanvasDraw) return;
    if (!c || !c.enabled) return;

    const sc  = Math.max(1, c.scale || 4);
    const vw  = Math.max(10, Math.round(c.width  || 240));
    const vh  = Math.max(10, Math.round(c.height || 135));
    const dpr = window.devicePixelRatio || 2;

    // Quality strategy:
    //   sc === 1 → high-fidelity: canvas internal = vw*dpr × vh*dpr for crisp
    //              text on retina (no upscale artefacts).
    //   sc  > 1  → pixel-art / LED-panel: canvas internal = vw × vh, CSS
    //              `image-rendering: pixelated` does the nearest-neighbour
    //              chunky-pixel upscale to vw*sc × vh*sc.
    const pixelated = (sc > 1);
    const internalW = pixelated ? vw : Math.round(vw * dpr);
    const internalH = pixelated ? vh : Math.round(vh * dpr);
    if (canvas.width !== internalW || canvas.height !== internalH) {
      canvas.width  = internalW;
      canvas.height = internalH;
    }
    canvas.style.width  = `${vw * sc}px`;
    canvas.style.height = `${vh * sc}px`;

    // Elements whose inline styles are mutated by applyClockTransform.
    const SNAP_IDS = ['clock', 'clockInner', 'dateLine', 'timeLine',
                      'hour', 'minute', 'colon-min', 'sec', 'colon-sec',
                      'millis', 'colon-millis'];

    // ── Synchronous snapshot ──────────────────────────────────────────────
    // 1. Snapshot REAL inline styles so we can restore by re-assigning them
    //    — NOT by recomputing.  applyClockTransform measures ink width, which
    //    changes when digits change ("1" is narrower than "8"), so a recompute
    //    would visibly shift the live clock every second.
    const realStyles = {};
    SNAP_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el) realStyles[id] = el.getAttribute('style') || '';
    });

    // 2. Apply virtual viewport + recompute layout for vw×vh.
    window._suppressCanvasDraw = true;
    window._virtualViewportOverride = { vw, vh };
    try {
      if (typeof applyClockTransform === 'function') applyClockTransform();
    } catch (e) { console.warn('[sim] applyClockTransform (virtual):', e); }

    // 3. Snapshot virtual styles + transform params.
    const virtualStyles = {};
    SNAP_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (el) virtualStyles[id] = el.getAttribute('style') || '';
    });
    const vtp = window.lastTransformParams ? { ...window.lastTransformParams } : null;

    // 4. Restore real styles + suppress CSS transition so the live clock
    //    doesn't animate from virtual→real (#clockInner has
    //    `transition: transform 420ms`; applyClockTransform's internal
    //    `void offsetHeight` commits the virtual transform, which would
    //    otherwise animate back to the real one).
    window._virtualViewportOverride = null;
    const ciLive = document.getElementById('clockInner');
    const tlLive = document.getElementById('timeLine');
    SNAP_IDS.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      if (realStyles[id]) el.setAttribute('style', realStyles[id]);
      else el.removeAttribute('style');
    });
    // Override the just-restored `transition` to suppress this frame's animation.
    if (ciLive) ciLive.style.transition = 'none';
    if (tlLive) tlLive.style.transition = 'none';
    // Force reflow so the browser commits the real transform with transition:none.
    void document.body.offsetHeight;
    // On the next frame, restore the original transitions (read from realStyles).
    requestAnimationFrame(() => {
      const ciStyle = realStyles['clockInner'] || '';
      const tlStyle = realStyles['timeLine'] || '';
      const ciTrans = (ciStyle.match(/transition\s*:\s*([^;]+)/i) || [, ''])[1].trim();
      const tlTrans = (tlStyle.match(/transition\s*:\s*([^;]+)/i) || [, ''])[1].trim();
      if (ciLive) ciLive.style.transition = ciTrans;
      if (tlLive) tlLive.style.transition = tlTrans;
    });
    window._suppressCanvasDraw = false;
    // ── End snapshot ──────────────────────────────────────────────────────

    _drawInFlight = true;
    document.querySelectorAll('.html2canvas-container').forEach(n => n.remove());

    console.log('[sim] start', { vw, vh, sc, dpr,
                                 internalW, internalH,
                                 scale: vtp?.scale, rot: vtp?.rotation });

    // Capture document.body, telling html2canvas the viewport is vw×vh.  In
    // onclone we ADDITIONALLY pin documentElement / body / #clockContainer /
    // #clock to exactly vw×vh px (overriding the 100vw/100vh CSS rules) so
    // flex reliably centres #clockInner at (vw/2, vh/2) regardless of how
    // html2canvas sizes its clone iframe.  Virtual font sizes were computed
    // for vw×vh, so only scale+rotation is applied to clockInner — no
    // translation needed.
    // html2canvas render resolution:
    //   sc===1 (high-fidelity, smooth): oversample at dpr for crisp retina text.
    //   sc> 1 (pixel-art / LED-panel):  render at native 1:1 so each source
    //                                   pixel maps to exactly one virtual
    //                                   pixel — NO downscale, NO double sampling.
    const h2cScale = pixelated ? 1 : dpr;
    html2canvas(document.body, {
      x: 0, y: 0, width: vw, height: vh,
      scale: h2cScale,
      backgroundColor: '#000',
      logging: false,
      useCORS: true,
      windowWidth:  vw,
      windowHeight: vh,
      scrollX: 0,
      scrollY: 0,
      removeContainer: true,
      onclone: (doc) => {
        console.log('[sim] onclone fired');
        // Apply virtual font sizes / margins.
        SNAP_IDS.forEach(id => {
          const el = doc.getElementById(id);
          if (!el) return;
          if (virtualStyles[id]) el.setAttribute('style', virtualStyles[id]);
          else el.removeAttribute('style');
        });

        // Pin the wrapper chain to exactly vw×vh px.
        if (doc.documentElement) {
          doc.documentElement.style.margin = '0';
          doc.documentElement.style.padding = '0';
          doc.documentElement.style.width  = vw + 'px';
          doc.documentElement.style.height = vh + 'px';
          doc.documentElement.style.overflow = 'hidden';
          doc.documentElement.style.background = '#000';
        }
        if (doc.body) {
          doc.body.style.margin = '0';
          doc.body.style.padding = '0';
          doc.body.style.width  = vw + 'px';
          doc.body.style.height = vh + 'px';
          doc.body.style.overflow = 'hidden';
          doc.body.style.background = '#000';
        }
        const cc = doc.getElementById('clockContainer');
        if (cc) {
          cc.style.position = 'fixed';
          cc.style.top = '0';
          cc.style.left = '0';
          cc.style.width  = vw + 'px';
          cc.style.height = vh + 'px';
          cc.style.margin = '0';
          cc.style.padding = '0';
          cc.style.overflow = 'hidden';
        }
        const c2 = doc.getElementById('clock');
        if (c2) {
          c2.style.position = 'fixed';
          c2.style.top = '0';
          c2.style.left = '0';
          c2.style.width  = vw + 'px';
          c2.style.height = vh + 'px';
          c2.style.display = 'flex';
          c2.style.visibility = 'visible';
          c2.style.margin = '0';
          c2.style.padding = '0';
          c2.style.transition = 'none';
        }

        // clockInner: flex centres its box at (vw/2, vh/2).  Apply the scale
        // that `applyClockTransform` computed for vw×vh — it accounts for the
        // worst-case digit string width (via getWorstCaseTimeWidth) so the
        // clock doesn't resize as digits change.  A naive in-clone measure of
        // current offsetWidth would give a too-large scale that overflows on
        // worst-case digits.
        const ci = doc.getElementById('clockInner');
        let fitScale = vtp ? vtp.scale : 1;
        if (ci) {
          ci.style.transform = `rotate(${vtp ? vtp.rotation : 0}deg) scale(${fitScale})`;
          ci.style.transformOrigin = 'center center';
          ci.style.transition = 'none';
        }
        // timeLine translateX was real-viewport-relative — zero it.
        const tl = doc.getElementById('timeLine');
        if (tl) {
          tl.style.transform = 'translateX(0)';
          tl.style.transition = 'none';
        }

        // Remove UI chrome.
        ['menuPlaceholder', 'rowCoordinateDisplay', 'virtualClockPopup']
          .forEach(id => { const el = doc.getElementById(id); if (el) el.remove(); });

        // ── Diagnostic measurements inside the clone ──────────────────────
        // Logs actual rendered sizes so we can see where the clock lands.
        try {
          const cloneWin = doc.defaultView || (doc.ownerDocument && doc.ownerDocument.defaultView);
          const vpW = cloneWin ? cloneWin.innerWidth  : '?';
          const vpH = cloneWin ? cloneWin.innerHeight : '?';
          const measure = (id) => {
            const el = doc.getElementById(id);
            if (!el) return null;
            const r = el.getBoundingClientRect();
            return { L: Math.round(r.left), T: Math.round(r.top),
                     W: Math.round(r.width), H: Math.round(r.height) };
          };
          console.log('[sim] clone viewport', vpW + '×' + vpH,
                      '  expected', vw + '×' + vh);
          console.log('[sim] clone body  ', measure('') /* skipped */);
          console.log('[sim] clone html  ',
            (() => { const r = doc.documentElement.getBoundingClientRect();
                     return {L:Math.round(r.left), T:Math.round(r.top),
                             W:Math.round(r.width), H:Math.round(r.height)}; })());
          console.log('[sim] clone body  ',
            (() => { const r = doc.body.getBoundingClientRect();
                     return {L:Math.round(r.left), T:Math.round(r.top),
                             W:Math.round(r.width), H:Math.round(r.height)}; })());
          console.log('[sim] clone #clock      ', measure('clock'));
          console.log('[sim] clone #clockInner ', measure('clockInner'),
                      'transform=' + (ci ? ci.style.transform : '?'),
                      'fitScale=' + fitScale.toFixed(4),
                      'vtpScale=' + (vtp ? vtp.scale.toFixed(4) : '?'));
          console.log('[sim] clone #dateLine   ', measure('dateLine'),
                      'fontSize=' + (doc.getElementById('dateLine')?.style.fontSize || '?'));
          console.log('[sim] clone #timeLine   ', measure('timeLine'),
                      'fontSize=' + (doc.getElementById('timeLine')?.style.fontSize || '?'));
        } catch (e) { console.warn('[sim] measure failed:', e); }
        // ──────────────────────────────────────────────────────────────────
      }
    }).then(src => {
      console.log('[sim] html2canvas done', src ? `${src.width}×${src.height}` : 'null');
      if (!src || !src.width || !src.height) return;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, internalW, internalH);
      // src dimensions:
      //   sc===1 → vw*dpr × vh*dpr  | canvas internal = vw*dpr × vh*dpr  (1:1 crisp).
      //   sc> 1 → vw    × vh      | canvas internal = vw    × vh      (1:1 native).
      // Either way the copy is 1:1 — no resampling, no detail loss.  CSS
      // `image-rendering: pixelated` then upscales the small bitmap to
      // vw*sc × vh*sc on screen for the chunky LED-panel look.
      ctx.imageSmoothingEnabled = !pixelated;
      if (!pixelated) ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(src, 0, 0, src.width, src.height, 0, 0, internalW, internalH);
    }).catch(err => {
      console.warn('[sim] html2canvas failed:', err);
    }).finally(() => {
      _drawInFlight = false;
      if (_drawQueued) { _drawQueued = false; drawClockToCanvas(); }
    });
  });
}

function computeSizingWeights(weightGap, fr) {
  const normalizedGap = normalizeSizingWeight(weightGap, DEFAULT_WEIGHT_GAP);
  const normalizedFr = normalizeSizingWeight(fr, DEFAULT_FONT_RATIO);
  const remaining = Math.max(0, 1 - normalizedGap);
  const weightTime = remaining / (normalizedFr + 1);
  const weightDate = normalizedFr * weightTime;

  return {
    weightGap: normalizedGap,
    fr: normalizedFr,
    weightDate,
    weightTime
  };
}

function getChildrenVisualBounds(element) {
  if (!element) return null;

  const childRects = Array.from(element.children || [])
    .map(child => child.getBoundingClientRect())
    .filter(rect => rect && (rect.width > 0 || rect.height > 0));

  if (!childRects.length) {
    const rect = element.getBoundingClientRect();
    return rect && (rect.width > 0 || rect.height > 0)
      ? { top: rect.top, right: rect.right, bottom: rect.bottom, left: rect.left, width: rect.width, height: rect.height }
      : null;
  }

  const top = Math.min(...childRects.map(rect => rect.top));
  const right = Math.max(...childRects.map(rect => rect.right));
  const bottom = Math.max(...childRects.map(rect => rect.bottom));
  const left = Math.min(...childRects.map(rect => rect.left));

  return {
    top,
    right,
    bottom,
    left,
    width: right - left,
    height: bottom - top
  };
}

function getElementsVisualBounds(elements) {
  const rects = (elements || [])
    .filter(Boolean)
    .map(el => el.getBoundingClientRect())
    .filter(rect => rect && (rect.width > 0 || rect.height > 0));

  if (!rects.length) return null;

  const top = Math.min(...rects.map(rect => rect.top));
  const right = Math.max(...rects.map(rect => rect.right));
  const bottom = Math.max(...rects.map(rect => rect.bottom));
  const left = Math.min(...rects.map(rect => rect.left));

  return {
    top,
    right,
    bottom,
    left,
    width: right - left,
    height: bottom - top
  };
}

function mergeBounds(boundsList) {
  const valid = (boundsList || []).filter(Boolean);
  if (!valid.length) return null;

  const top = Math.min(...valid.map(bounds => bounds.top));
  const right = Math.max(...valid.map(bounds => bounds.right));
  const bottom = Math.max(...valid.map(bounds => bounds.bottom));
  const left = Math.min(...valid.map(bounds => bounds.left));

  return {
    top,
    right,
    bottom,
    left,
    width: right - left,
    height: bottom - top
  };
}

function getTextNodeVisualBounds(textNode) {
  if (!textNode || textNode.nodeType !== Node.TEXT_NODE) return null;
  const text = textNode.textContent || "";
  if (!text.length) return null;

  const range = document.createRange();
  const charBounds = [];

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    if (!char || !char.trim()) continue;

    range.setStart(textNode, i);
    range.setEnd(textNode, i + 1);
    const rect = range.getBoundingClientRect();
    if (rect && (rect.width > 0 || rect.height > 0)) {
      charBounds.push({
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        left: rect.left,
        width: rect.width,
        height: rect.height
      });
    }
  }

  range.detach?.();
  return mergeBounds(charBounds);
}


function getRenderedTextBounds(element) {
  if (!element) return null;

  const walker = document.createTreeWalker(
    element,
    NodeFilter.SHOW_TEXT,
    {
      acceptNode(node) {
        const value = (node && node.textContent) ? node.textContent : "";
        return value.trim().length > 0
          ? NodeFilter.FILTER_ACCEPT
          : NodeFilter.FILTER_SKIP;
      }
    }
  );

  const textBounds = [];
  let current = walker.nextNode();
  while (current) {
    const bounds = getTextNodeVisualBounds(current);
    if (bounds) textBounds.push(bounds);
    current = walker.nextNode();
  }

  return mergeBounds(textBounds);
}

function getElementsRenderedTextBounds(elements) {
  const bounds = (elements || [])
    .filter(Boolean)
    .map(el => getRenderedTextBounds(el))
    .filter(Boolean);
  return mergeBounds(bounds);
}

let rowDebugMetricsCtx = null;

function getRowDebugMetricsContext() {
  if (rowDebugMetricsCtx) return rowDebugMetricsCtx;
  const canvas = document.createElement("canvas");
  rowDebugMetricsCtx = canvas.getContext("2d");
  return rowDebugMetricsCtx;
}

function getCanvasFontFromComputedStyle(style) {
  if (!style) return "16px sans-serif";
  return `${style.fontStyle || "normal"} ${style.fontVariant || "normal"} ${style.fontWeight || "400"} ${style.fontSize || "16px"} ${style.fontFamily || "sans-serif"}`;
}

function getChildInkApproxBounds(child) {
  if (!child) return null;
  const text = (child.textContent || "").trim();
  if (!text) return null;

  const rect = child.getBoundingClientRect();
  if (!rect || !(rect.width > 0 || rect.height > 0)) return null;

  const style = getComputedStyle(child);
  const ctx = getRowDebugMetricsContext();
  if (!ctx) return {
    top: rect.top,
    right: rect.right,
    bottom: rect.bottom,
    left: rect.left,
    width: rect.width,
    height: rect.height
  };

  ctx.font = getCanvasFontFromComputedStyle(style);
  const metrics = ctx.measureText(text);
  const fontAscent = Number(metrics.fontBoundingBoxAscent) || 0;
  const fontDescent = Number(metrics.fontBoundingBoxDescent) || 0;
  const actualAscent = Number(metrics.actualBoundingBoxAscent) || 0;
  const actualDescent = Number(metrics.actualBoundingBoxDescent) || 0;

  const fontHeight = fontAscent + fontDescent;
  const actualHeight = actualAscent + actualDescent;

  const trimRatio = fontHeight > 0 && actualHeight > 0
    ? Math.max(0, Math.min(0.45, (1 - (actualHeight / fontHeight)) / 2))
    : 0;
  const top = rect.top + (rect.height * trimRatio);
  const bottom = rect.bottom - (rect.height * trimRatio);

  return {
    top,
    right: rect.right,
    bottom,
    left: rect.left,
    width: rect.width,
    height: Math.max(0, bottom - top)
  };
}

function getChildrenInkApproxBounds(element) {
  if (!element) return null;
  const bounds = Array.from(element.children || [])
    .map(getChildInkApproxBounds)
    .filter(Boolean);
  return mergeBounds(bounds);
}

function getVisualGapPx(upperBounds, lowerBounds) {
  if (!upperBounds || !lowerBounds) return null;
  return lowerBounds.top - upperBounds.bottom;
}

function getAlphaBoundsInBand(data, width, height, yStart, yEnd) {
  return getAlphaBoundsInRegion(data, width, height, 0, width - 1, yStart, yEnd);
}

function getAlphaBoundsInRegion(data, width, height, xStart, xEnd, yStart, yEnd) {
  if (!data || !width || !height) return null;
  const yMin = Math.max(0, Math.min(height - 1, yStart));
  const yMax = Math.max(0, Math.min(height - 1, yEnd));
  const xMin0 = Math.max(0, Math.min(width - 1, xStart));
  const xMax0 = Math.max(0, Math.min(width - 1, xEnd));
  if (yMax < yMin || xMax0 < xMin0) return null;

  let minX = width;
  let minY = height;
  let maxX = -1;
  let maxY = -1;

  const INK_THRESHOLD = 24;
  for (let y = yMin; y <= yMax; y += 1) {
    const rowOffset = y * width;
    for (let x = xMin0; x <= xMax0; x += 1) {
      const idx = (rowOffset + x) * 4;
      if (data[idx + 3] < 8) continue;
      const brightness = Math.max(data[idx], data[idx + 1], data[idx + 2]);
      if (brightness < INK_THRESHOLD) continue;
      if (x < minX) minX = x;
      if (y < minY) minY = y;
      if (x > maxX) maxX = x;
      if (y > maxY) maxY = y;
    }
  }

  if (maxX < minX || maxY < minY) return null;
  return { minX, minY, maxX, maxY };
}

let _measureTextCanvas = null;
function getMeasureTextCtx() {
  if (!_measureTextCanvas) _measureTextCanvas = document.createElement("canvas");
  return _measureTextCanvas.getContext("2d");
}

function measureRowInkBounds(lineEl) {
  if (!lineEl) return null;
  const rect = lineEl.getBoundingClientRect();
  if (!rect || rect.width <= 0 || rect.height <= 0) return null;

  const ctx = getMeasureTextCtx();
  const children = Array.from(lineEl.children).filter(c => (c.textContent || "").trim().length > 0);
  const measurables = children.length ? children : [lineEl];

  let topMin = Number.POSITIVE_INFINITY;
  let bottomMax = Number.NEGATIVE_INFINITY;
  let leftMin = Number.POSITIVE_INFINITY;
  let rightMax = Number.NEGATIVE_INFINITY;

  for (const child of measurables) {
    const text = child.textContent || "";
    if (!text.trim()) continue;
    const childRect = child.getBoundingClientRect();
    if (!childRect || childRect.height <= 0) continue;

    const cs = getComputedStyle(child);
    const fontSizePx = parseFloat(cs.fontSize) || 0;
    let lineHeightPx = parseFloat(cs.lineHeight);
    if (!Number.isFinite(lineHeightPx) || lineHeightPx <= 0) lineHeightPx = fontSizePx;
    if (fontSizePx <= 0 || lineHeightPx <= 0) continue;

    // The clock is rendered under a CSS scale transform on #clockInner.
    // getBoundingClientRect returns post-transform px; getComputedStyle returns
    // pre-transform CSS px. The effective scale = post / pre, derived from
    // the child's own line box (rect.height pre-transform == lineHeightPx).
    const scale = childRect.height / lineHeightPx;
    if (!Number.isFinite(scale) || scale <= 0) continue;

    ctx.font = `${cs.fontStyle || "normal"} ${cs.fontWeight || "normal"} ${cs.fontSize} ${cs.fontFamily}`;
    const m = ctx.measureText(text);
    if (!m) continue;
    const FA = Number.isFinite(m.fontBoundingBoxAscent) ? m.fontBoundingBoxAscent : fontSizePx * 0.8;
    const FD = Number.isFinite(m.fontBoundingBoxDescent) ? m.fontBoundingBoxDescent : fontSizePx * 0.2;
    const AA = m.actualBoundingBoxAscent || 0;
    const AD = m.actualBoundingBoxDescent || 0;

    // CSS half-leading: baseline = top + (lineHeight + FA - FD) / 2
    // (works for both positive and negative half-leading; when line-height
    // is smaller than the font's intrinsic ascent+descent, glyphs overflow
    // the line box symmetrically and this formula still locates the baseline.)
    const baselineOffset = (lineHeightPx + FA - FD) / 2;
    const baselineY = childRect.top + baselineOffset * scale;

    const top = baselineY - AA * scale;
    const bottom = baselineY + AD * scale;

    if (top < topMin) topMin = top;
    if (bottom > bottomMax) bottomMax = bottom;

    // Horizontal ink bounds: actualBoundingBoxLeft is the distance from the
    // text alignment point (≈ childRect.left) to the left ink edge, positive
    // meaning "to the left". For narrow glyphs like "1" whose ink sits on the
    // right of the advance, ABL is negative — shifting inkLeft rightward.
    //
    // ABR must be corrected for CSS letter-spacing: canvas.measureText does not
    // model it, so each character after the first is rendered (n-1)*ls px
    // further right than canvas assumes.
    const ABL = Number.isFinite(m.actualBoundingBoxLeft)  ? m.actualBoundingBoxLeft  : 0;
    const ABR = Number.isFinite(m.actualBoundingBoxRight) ? m.actualBoundingBoxRight : childRect.width / scale;
    const letterSpacingPx = parseFloat(cs.letterSpacing) || 0;
    const adjustedABR = ABR + Math.max(0, text.length - 1) * letterSpacingPx;
    const inkLeft  = childRect.left - ABL * scale;
    const inkRight = childRect.left + adjustedABR * scale;
    if (inkLeft  < leftMin)  leftMin  = inkLeft;
    if (inkRight > rightMax) rightMax = inkRight;
  }

  if (!Number.isFinite(topMin) || !Number.isFinite(bottomMax)) return null;

  const finalLeft  = Number.isFinite(leftMin)  ? leftMin  : rect.left;
  const finalRight = Number.isFinite(rightMax) ? rightMax : rect.right;
  return {
    left:   finalLeft,
    top:    topMin,
    right:  finalRight,
    bottom: bottomMax,
    width:  Math.max(0, finalRight - finalLeft),
    height: Math.max(0, bottomMax - topMin)
  };
}

function transformBounds(rawBounds, hLocalOffset, hOffsetVp, vOffsetVp, rotation, scale, Cx, Cy) {
  if (!rawBounds) return null;
  const theta = rotation * Math.PI / 180;
  const cos = Math.cos(theta);
  const sin = Math.sin(theta);

  // Four corners of the raw bounding box
  const corners = [
    { x: rawBounds.left, y: rawBounds.top },
    { x: rawBounds.right, y: rawBounds.top },
    { x: rawBounds.left, y: rawBounds.bottom },
    { x: rawBounds.right, y: rawBounds.bottom }
  ];

  const transCorners = corners.map(p => {
    // 1. Apply local scale-1 horizontal translation
    const xL = p.x + hLocalOffset;
    const yL = p.y;

    // 2. Rotate and scale around the pivot (Cx, Cy)
    const dx = xL - Cx;
    const dy = yL - Cy;

    const xRot = (dx * cos - dy * sin) * scale;
    const yRot = (dx * sin + dy * cos) * scale;

    // 3. Project to viewport space including physical offsets
    return {
      x: Cx + hOffsetVp + xRot,
      y: Cy + vOffsetVp + yRot
    };
  });

  const xs = transCorners.map(p => p.x);
  const ys = transCorners.map(p => p.y);
  const left = Math.min(...xs);
  const right = Math.max(...xs);
  const top = Math.min(...ys);
  const bottom = Math.max(...ys);

  return {
    left,
    right,
    top,
    bottom,
    width: right - left,
    height: bottom - top
  };
}

function getClockRowInkBounds(dateLine, timeLine) {
  if (!dateLine || !timeLine) return null;

  const clockInner = document.getElementById("clockInner");
  if (!clockInner) return null;

  // Temporarily neutralize rotation & scale transforms to get reliable unrotated sizing.
  // Neutralise transition properties so setting .transform = "none" is immediate/synchronous.
  const savedClockInnerTransform = clockInner.style.transform;
  const savedClockInnerTransition = clockInner.style.transition;
  const savedTimeLineTransform = timeLine.style.transform;
  const savedTimeLineTransition = timeLine.style.transition;

  clockInner.style.transition = "none";
  if (timeLine) timeLine.style.transition = "none";

  clockInner.style.transform = "none";
  if (timeLine) timeLine.style.transform = "none";

  // Force a synchronous reflow so layout calculations reflect zero transform immediately
  void clockInner.offsetHeight;

  const dateBounds = measureRowInkBounds(dateLine);
  const timeBounds = measureRowInkBounds(timeLine);

  clockInner.style.transform = savedClockInnerTransform;
  if (timeLine) timeLine.style.transform = savedTimeLineTransform;

  // Force synchronous reflow to restore layout state before reenabling transitions
  void clockInner.offsetHeight;

  clockInner.style.transition = savedClockInnerTransition;
  if (timeLine) timeLine.style.transition = savedTimeLineTransition;

  if (!dateBounds && !timeBounds) return null;

  // Grab the parameter context used during the last applyClockTransform layout run
  const params = window.lastTransformParams || {
    scale: 1,
    rotation: 0,
    hLocalOffset: 0,
    hOffsetVp: 0,
    vOffsetVp: 0,
    Cx: getClockViewportSize().vw / 2,
    Cy: getClockViewportSize().vh / 2
  };

  const transformedDateBounds = transformBounds(
    dateBounds,
    0,
    params.hOffsetVp,
    params.vOffsetVp,
    params.rotation,
    params.scale,
    params.Cx,
    params.Cy
  );

  const transformedTimeBounds = transformBounds(
    timeBounds,
    params.hLocalOffset,
    params.hOffsetVp,
    params.vOffsetVp,
    params.rotation,
    params.scale,
    params.Cx,
    params.Cy
  );

  return {
    dateBounds: transformedDateBounds,
    timeBounds: transformedTimeBounds
  };
}

function getVisualBlockHeight(dateLine, timeLine) {
  const dateBounds = getRenderedTextBounds(dateLine) || getChildrenVisualBounds(dateLine);
  const timeBounds = getRenderedTextBounds(timeLine) || getChildrenVisualBounds(timeLine);
  if (!dateBounds || !timeBounds) return 0;
  return Math.max(0, timeBounds.bottom - dateBounds.top);
}

let rowCoordinateUpdatePending = false;
let rowCoordinateRequestToken = 0;

function ensureDebugRowBox(id, label) {
  let box = document.getElementById(id);
  if (box) return box;

  box = document.createElement("div");
  box.id = id;
  box.className = "debug-row-box";
  box.setAttribute("aria-hidden", "true");

  const tag = document.createElement("span");
  tag.className = "debug-row-box-label";
  tag.textContent = label;
  box.appendChild(tag);

  document.body.appendChild(box);
  return box;
}

function updateDebugRowBox(box, bounds) {
  if (!box) return;
  if (!bounds) {
    box.style.display = "none";
    return;
  }

  box.style.display = "block";
  box.style.left = `${Math.round(bounds.left)}px`;
  box.style.top = `${Math.round(bounds.top)}px`;
  box.style.width = `${Math.max(0, Math.round(bounds.width))}px`;
  box.style.height = `${Math.max(0, Math.round(bounds.height))}px`;
}

function formatVisualBounds(bounds) {
  if (!bounds) return "n/a";
  return `${Math.round(bounds.left)},${Math.round(bounds.top)},${Math.round(bounds.width)},${Math.round(bounds.height)}`;
}

async function updateRowCoordinateDisplay() {
  const requestToken = ++rowCoordinateRequestToken;

  const dateDebugBox = ensureDebugRowBox("dateRowDebugBox", "date");
  const timeDebugBox = ensureDebugRowBox("timeRowDebugBox", "time");
  const display = document.getElementById("rowCoordinateDisplay");

  const showDebug = typeof state !== "undefined" && state.showDebug === true;
  if (!showDebug) {
    if (dateDebugBox) dateDebugBox.style.display = "none";
    if (timeDebugBox) timeDebugBox.style.display = "none";
    if (display) display.style.display = "none";
    return;
  }
  if (display) display.style.display = "";

  const dateLine = document.getElementById("dateLine");
  const timeLine = document.getElementById("timeLine");

  const preciseRowBounds = getClockRowInkBounds(dateLine, timeLine);
  if (requestToken !== rowCoordinateRequestToken) return;

  const dateBounds = preciseRowBounds?.dateBounds || getChildrenVisualBounds(dateLine) || getRenderedTextBounds(dateLine);
  const timeBounds = preciseRowBounds?.timeBounds || getChildrenVisualBounds(timeLine) || getRenderedTextBounds(timeLine);
  const gapHeight = getVisualGapPx(dateBounds, timeBounds);

  updateDebugRowBox(dateDebugBox, dateBounds);
  updateDebugRowBox(timeDebugBox, timeBounds);

  if (!display) return;

  const hourEl = document.getElementById("hour");
  const timeFontPx = hourEl ? Math.round(parseFloat(getComputedStyle(hourEl).fontSize)) : null;
  const timeFontFamily = hourEl ? getComputedStyle(hourEl).fontFamily.split(',')[0].trim().replace(/['"]/g, '') : "n/a";
  const simPart = cycleTimer !== null ? ` | sim ${(cycleStep - 1) % 40}` : "";
  const { vw: _dvw, vh: _dvh } = getClockViewportSize();
  const glowPart = (state.glowEnabled && state.glowAmount > 0)
    ? ` | glow ${(state.glowAmount * 0.005).toFixed(3)}em`
    : "";
  display.textContent = `date ${formatVisualBounds(dateBounds)} | time ${formatVisualBounds(timeBounds)} | gap ${Number.isFinite(gapHeight) ? Math.round(gapHeight) : "n/a"} px | vwh ${_dvw},${_dvh} | time font ${timeFontFamily} ${timeFontPx !== null ? timeFontPx + " px" : "n/a"}${simPart}${glowPart}`;}

function scheduleRowCoordinateDisplayUpdate() {
  if (rowCoordinateUpdatePending) return;
  rowCoordinateUpdatePending = true;

  requestAnimationFrame(() => {
    rowCoordinateUpdatePending = false;
    void updateRowCoordinateDisplay();
  });
}

function requestLayoutAfterFonts(fontFamilies) {
  if (!document.fonts || typeof document.fonts.load !== "function") return;

  const families = [...new Set((fontFamilies || [])
    .map(v => String(v || "").trim())
    .filter(Boolean))];
  if (!families.length) return;

  const clock = document.getElementById("clock");
  // Check if any of the target fonts are not fully loaded yet.
  // If there are unloaded fonts, temporarily hide the clock
  // so we don't display a mismatched, horribly unaligned layout
  // with fallback monospace fonts.
  const anyUnloaded = families.some(family => !document.fonts.check(`120px "${family}"`));
  if (anyUnloaded && clock) {
    clock.style.visibility = "hidden";
  }

  const token = ++fontLayoutRequestToken;
  Promise.all(families.map(family =>
    document.fonts.load(`120px "${family}"`).catch(() => null)
  )).then(() => {
    if (token !== fontLayoutRequestToken) return;
    updateClock();
    applyClockTransform();
    scheduleRowCoordinateDisplayUpdate();
    if (clock && anyUnloaded) {
      // Allow browser single-frame settling, then make visible
      requestAnimationFrame(() => {
        clock.style.visibility = "visible";
      });
    }
  });
}

window.requestLayoutAfterFonts = requestLayoutAfterFonts;

function activateConfigurationMode() {
  if (typeof window.toggleConfigUI === "function") window.toggleConfigUI();
}

function toggleDebugMode() {
  if (typeof state === "undefined") return;
  state.showDebug = !state.showDebug;
  if (typeof saveShowDebug === "function") saveShowDebug(state.showDebug);
  
  // Update the checkbox if it exists in the config UI
  const showDebugCheckbox = document.getElementById("showDebug");
  if (showDebugCheckbox) showDebugCheckbox.checked = state.showDebug;
  
  scheduleRowCoordinateDisplayUpdate();
}

function cycleFont(direction = 1) {
  const numericFontSelect = document.getElementById("numericFontSelect");
  if (!numericFontSelect || numericFontSelect.options.length === 0) return;
  
  const currentIndex = numericFontSelect.selectedIndex;
  const totalOptions = numericFontSelect.options.length;
  const nextIndex = (currentIndex + direction + totalOptions) % totalOptions;
  numericFontSelect.selectedIndex = nextIndex;
  
  // Trigger input event to apply the change
  numericFontSelect.dispatchEvent(new Event("input", { bubbles: true }));
}

function cycleProfile(direction = 1) {
  const profileSelect = document.getElementById("profileSelect");
  if (!profileSelect || profileSelect.options.length === 0) return;

  const currentIndex = profileSelect.selectedIndex;
  const totalOptions = profileSelect.options.length;
  const nextIndex = (currentIndex + direction + totalOptions) % totalOptions;
  profileSelect.selectedIndex = nextIndex;

  // Trigger change/input handlers to load the selected profile.
  profileSelect.dispatchEvent(new Event("change", { bubbles: true }));
}

function stopDigitCycle() {
  if (!cycleTimer) return;
  clearInterval(cycleTimer);
  cycleTimer = null;
  simulationHour = null;
}

function applyDigitCycleStep() {
  const digit = String(cycleStep % 10);
  const mode = Math.floor(cycleStep / 10) % 4;
  simulationDigit = digit;
  simulationWeekday = simulatedWeekdays[cycleStep % simulatedWeekdays.length];
  simulationMonth = months[cycleStep % months.length];
  if (mode === 0) simulationHour = "0" + digit;
  else if (mode === 1) simulationHour = "1" + digit;
  else if (mode === 2) simulationHour = "1";
  else simulationHour = " 1";
  cycleStep += 1;

  updateClock();
  applyClockTransform();
}

function startDigitCycle() {
  stopDigitCycle();
  cycleStep = 0;
  applyDigitCycleStep();
  cycleTimer = setInterval(applyDigitCycleStep, 200);

function ensureTimeScaleProbe() {

function handleKeyDown(e) {

  if (e.key === "Control" || e.key === "Alt" || e.key === "Meta" || e.key === "Shift") return;
  const t = e.target;
  if (t && (t.tagName === "TEXTAREA" || (t.tagName === "INPUT" && t.type !== "checkbox" && t.type !== "range" && t.type !== "color"))) return;
  const key = e.key;
  if (key === "x" || key === "X" || key === "m" || key === "M") {
    activateConfigurationMode();
    return;
  }

  if (key === "d" || key === "D") {
    toggleDebugMode();
    return;

  if (key === "f" || key === "F") {
    cycleFont(key === "f" ? 1 : -1);
    return;

  if (key === "p" || key === "P") {
    cycleProfile(key === "p" ? 1 : -1);

  if (key === "r" || key === "R") {
    rotateClock();

  if (key === "9") {

    return;
  }

  if (key === " ") {
    setSimulationModeByKey("0");
    return;
  }

  setSimulationModeByKey(key);
}

      location.reload();
    }
  }, 60000);

  // ── Real-time GPU health overlay ─────────────────────────────────────────
  var _overlay = document.getElementById('gpuHealthOverlay');

  function _isGpuOverlayEnabled() {
    return typeof state !== "undefined" && state.showGpuInfo === true;
  }

  var _lastFps = 0;
  var _contextLost = false;
  var _lastGlErr = 'none';
  var _lastWatchdog = '—';

  // Track rAF rate for overlay display only (no longer used for watchdog).
  (function fpsSampler() {
    var _buf = [];
    var _fn = function(ts) {
      _buf.push(ts);
      if (_buf.length > 30) _buf.shift();
      if (_buf.length >= 2) {
        var span = _buf[_buf.length-1] - _buf[0];
        _lastFps = (_buf.length - 1) / (span / 1000);
      }
      requestAnimationFrame(_fn);
    };
    requestAnimationFrame(_fn);
  }());

  probe.addEventListener('webglcontextlost', function() {
    _contextLost = true;
    _lastWatchdog = 'B1:ctx-lost';
  });

  function _updateOverlay() {
    if (!_overlay) return;
    if (!_isGpuOverlayEnabled()) {
      _overlay.style.display = 'none';
      return;
    }
    _overlay.style.display = 'block';
    var uptimeMin = (Date.now() - _startMs) / 60000;
    var ctxClass  = _contextLost ? 'gpu-error' : 'gpu-ok';
    var ctxLabel  = _contextLost ? 'LOST' : 'ok';
    var fpsClass  = _lastFps > 10 ? (_lastFps > 20 ? 'gpu-error' : 'gpu-warn') : 'gpu-ok';
    var errClass  = (_glErrCount > 0) ? 'gpu-error' : 'gpu-ok';
    var wdClass   = (_lastWatchdog !== '—') ? 'gpu-warn' : 'gpu-ok';
    _overlay.innerHTML =
      'GPU  ctx:<span class="' + ctxClass + '">' + ctxLabel + '</span>' +
      '  fps:<span class="' + fpsClass + '">' + _lastFps.toFixed(0) + '</span>' +
      '  oom:<span class="' + errClass + '">' + _glErrCount + '</span>' +
      '\nup:' + uptimeMin.toFixed(1) + 'm' +
      '  wd:<span class="' + wdClass + '">' + _lastWatchdog + '</span>';
  }
  window.scheduleGpuHealthOverlayUpdate = _updateOverlay;
  setInterval(_updateOverlay, 1000);
}());
applyClockTransform();
(function() {
  const weekdayEl = document.getElementById("weekday");
  const secEl = document.getElementById("sec");
  const yearEl = document.getElementById("year");
  
  function isTapInRect(clientX, clientY, element, padX = 20, padY = 20) {
    if (!element) return false;
    const rect = element.getBoundingClientRect();
    if (!rect || rect.width === 0 || rect.height === 0) return false;
    return (
      clientX >= rect.left - padX &&
      clientX <= rect.right + padX &&
      clientY >= rect.top - padY &&
      clientY <= rect.bottom + padY
    );
  }

  function handleInteraction(clientX, clientY, e) {
    if (isTapInRect(clientX, clientY, weekdayEl, 40, 40)) {
      e.stopPropagation();
      e.preventDefault();
      rotateClock();
      return true;
    }
    if (isTapInRect(clientX, clientY, secEl, 40, 40)) {
      e.stopPropagation();
      e.preventDefault();
      activateConfigurationMode();
      return true;
    }
    if (isTapInRect(clientX, clientY, yearEl, 40, 40)) {
      e.stopPropagation();
      e.preventDefault();
      toggleFullscreen();
      return true;
    }
    return false;
  }

  // Click handler
  window.addEventListener("click", function(e) {
    if (e.target.id === "menuButton" || document.getElementById("menuPanel")?.contains(e.target)) {
      return;
    }
    handleInteraction(e.clientX, e.clientY, e);
  }, { capture: true });

  // Touch handler (handles immediate physical taps on Android)
  window.addEventListener("touchend", function(e) {
    if (e.target.id === "menuButton" || document.getElementById("menuPanel")?.contains(e.target)) {
      return;
    }
    if (e.changedTouches && e.changedTouches.length > 0) {
      const touch = e.changedTouches[0];
      handleInteraction(touch.clientX, touch.clientY, e);
    }
  }, { capture: true, passive: false });
})();
window.addEventListener("resize", () => {
  if (typeof applyClockTransform === "function") applyClockTransform();
  applyContainerMode();
  if (typeof window.updateContainerSizeHint === "function") window.updateContainerSizeHint();
});
window.addEventListener("orientationchange", applyClockTransform);
document.addEventListener("contextmenu", e => { e.preventDefault(); });
window.addEventListener("keydown", handleKeyDown);

if (document.fonts && typeof document.fonts.addEventListener === "function") {
  document.fonts.addEventListener("loadingdone", () => {
    const clock = document.getElementById("clock");
    if (!clock || getComputedStyle(clock).display === "none") return;

    // Late webfont resolution can shift glyph geometry after initial layout.
    // Re-apply transform so reload reaches the same settled state as resize.
    applyClockTransform();
    scheduleRowCoordinateDisplayUpdate();
  });
}

(async function showClockWhenFontReady() {
  if (document.readyState !== "complete") {
    await new Promise(resolve =>
      window.addEventListener("load", resolve, { once: true })
    );
  }

  const fontNames = new Set(["Digital7Mono"]);
  if (typeof state === "object" && state) {
    if (state.numericFont) fontNames.add(state.numericFont);
    if (state.alphaFont) fontNames.add(state.alphaFont);
  }

  if (document.fonts && typeof document.fonts.load === "function") {
    for (const fontName of fontNames) {
      try {
        await document.fonts.load(`80px "${fontName}"`);
      } catch (e) {
        console.warn(`Font load error for ${fontName}:`, e);
      }
    }

    try {
      await Promise.race([
        document.fonts.ready,
        new Promise(resolve => setTimeout(resolve, 1500))
      ]);
    } catch (e) {
      console.warn("document.fonts.ready error:", e);
    }
  }

  const configFontsReadyPromise = window.configurationFontsReadyPromise;
  if (configFontsReadyPromise && typeof configFontsReadyPromise.then === "function") {
    try {
      await Promise.race([
        configFontsReadyPromise,
        new Promise(resolve => setTimeout(resolve, 1500))
      ]);
    } catch (e) {
      console.warn("configurationFontsReadyPromise error:", e);
    }
  }

  const clock = document.getElementById("clock");
  if (clock) {
    clock.style.visibility = "hidden";
    clock.style.display = "flex";
    // Suppress canvas draws during the hidden phase so the pixelated overlay
    // never flickers a wrong-font layout at the user.
    window._suppressCanvasDraw = true;
    applyClockTransform();

    await new Promise(resolve => setTimeout(resolve, 350));
    applyClockTransform();

    window._suppressCanvasDraw = false;
    clock.style.visibility = "visible";
    applyContainerMode(); // start canvas overlay now with correct layout
    scheduleRowCoordinateDisplayUpdate();
  }
  scheduleRowCoordinateDisplayUpdate();
})();

document.getElementById("rowCoordinateDisplay").addEventListener("click", function() {
  const text = this.textContent;
  if (!text) return;

  function showToast(msg) {
    let toast = document.getElementById("debugCopyToast");
    if (!toast) {
      toast = document.createElement("div");
      toast.id = "debugCopyToast";
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.classList.add("visible");
    clearTimeout(toast._hideTimer);
    toast._hideTimer = setTimeout(() => toast.classList.remove("visible"), 1400);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast("copied"), () => showToast("copy failed"));
  } else {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      showToast("copied");
    } catch { showToast("copy failed"); }
  }
});

(function setupVirtualClockPopup() {
  const popup = document.getElementById("virtualClockPopup");
  const header = document.getElementById("virtualClockHeader");
  const closeBtn = document.getElementById("virtualClockCloseBtn");
  if (!popup || !header) return;

  let dragging = false;
  let dragOffX = 0;
  let dragOffY = 0;

  header.addEventListener("mousedown", (e) => {
    if (e.target === closeBtn || (e.target && e.target.closest && e.target.closest("#virtualClockCloseBtn"))) return;
    dragging = true;
    const rect = popup.getBoundingClientRect();
    dragOffX = e.clientX - rect.left;
    dragOffY = e.clientY - rect.top;
    header.style.cursor = "grabbing";
    e.preventDefault();
  });

  document.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const left = Math.max(0, Math.min(e.clientX - dragOffX, window.innerWidth - popup.offsetWidth));
    const top = Math.max(0, Math.min(e.clientY - dragOffY, window.innerHeight - popup.offsetHeight));
    popup.style.left = `${left}px`;
    popup.style.top = `${top}px`;
    popup.style.right = "auto";
  });

  document.addEventListener("mouseup", () => {
    if (dragging) {
      dragging = false;
      header.style.cursor = "grab";
    }
  });

  header.addEventListener("touchstart", (e) => {
    if (e.target === closeBtn || (e.target && e.target.closest && e.target.closest("#virtualClockCloseBtn"))) return;
    if (!e.touches || e.touches.length === 0) return;
    const t = e.touches[0];
    const rect = popup.getBoundingClientRect();
    dragging = true;
    dragOffX = t.clientX - rect.left;
    dragOffY = t.clientY - rect.top;
    e.preventDefault();
  }, { passive: false });

  document.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    if (!e.touches || e.touches.length === 0) return;
    const t = e.touches[0];
    const left = Math.max(0, Math.min(t.clientX - dragOffX, window.innerWidth - popup.offsetWidth));
    const top = Math.max(0, Math.min(t.clientY - dragOffY, window.innerHeight - popup.offsetHeight));
    popup.style.left = `${left}px`;
    popup.style.top = `${top}px`;
    popup.style.right = "auto";
    e.preventDefault();
  }, { passive: false });

  document.addEventListener("touchend", () => {
    dragging = false;
  });

  if (closeBtn) {
    closeBtn.addEventListener("click", () => {
      const cb = document.getElementById("containerEnabled");
      if (cb) {
        cb.checked = false;
        cb.dispatchEvent(new Event("change"));
      }
    });
  }
})();
