<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Menu Fragment</title>
</head>
<body>
<div id="menuPanel">
    <div class="section">
        <select id="profileSelect"></select>
    </div>

    <div class="section">
        <h3>Fonts</h3>
        <label>
            Numeric font
        </label>
        <select id="numericFontSelect"></select>

        <label>
            <input type="checkbox" id="multiFont" checked>
            Multi Font
        </label>

        <label id="alphaFontLabel">
            Alpha font
        </label>
        <select id="alphaFontSelect"></select>

        <label id="colonFontLabel">
            Colon font
        </label>
        <select id="colonFontSelect"></select>
    </div>

    <div class="section">
        <h3>Group scale & offset</h3>

        <label>
            Numeric scale
            <span class="valueBadge" id="numericScaleValue"></span>
        </label>
        <input type="range" id="numericScale" min="50" max="200" step="1">

        <label>
            Numeric offset factor
            <span class="valueBadge" id="numericOffsetValue"></span>
        </label>
        <input type="range" id="numericOffset" min="-1" max="1" step="0.01">

        <label id="alphaScaleLabel">
            Alpha scale
            <span class="valueBadge" id="alphaScaleValue"></span>
        </label>
        <input type="range" id="alphaScale" min="50" max="200" step="1">

        <label id="alphaOffsetLabel">
            Alpha offset factor
            <span class="valueBadge" id="alphaOffsetValue"></span>
        </label>
        <input type="range" id="alphaOffset" min="-1" max="1" step="0.01">

        <label id="colonScaleLabel">
            Colon scale
            <span class="valueBadge" id="colonScaleValue"></span>
        </label>
        <input type="range" id="colonScale" min="50" max="200" step="1">

        <label id="colonOffsetLabel">
            Colon offset factor
            <span class="valueBadge" id="colonOffsetValue"></span>
        </label>
        <input type="range" id="colonOffset" min="-1" max="1" step="0.01">

    </div>

    <div class="section">
        <h3>Clock sizing</h3>

        <label>
            Gap weight
            <span class="valueBadge" id="weightGapValue"></span>
        </label>
        <input type="range" id="weightGap" min="0" max="0.99" step="0.01">

        <label>
            Size date/time
            <span class="valueBadge" id="frValue"></span>
        </label>
        <input type="range" id="fr" min="0.01" max="0.99" step="0.01">

        <label>
            Size hours / seconds
            <span class="valueBadge" id="secFontFactorValue"></span>
        </label>
        <input type="range" id="secFontFactor" min="0.1" max="2" step="0.01">

        <label>
            Seconds colon distance
            <span class="valueBadge" id="secColonDistanceValue"></span>
        </label>
        <input type="range" id="secColonDistance" min="0" max="1" step="0.01">

        <label>
            Seconds (:SS) vertical offset
            <span class="valueBadge" id="secOffsetValue"></span>
        </label>
        <input type="range" id="secOffset" min="-1" max="1" step="0.01">

        <label>
            Maximum fill
            <span class="valueBadge" id="sizeBudgetValue"></span>
        </label>
        <input type="range" id="sizeBudget" min="0.5" max="1" step="0.01" value="0.95">
    </div>

    <div class="section">
        <h3>Clock Colors</h3>
        <label>
            Date
            <input type="color" id="dateColor">
        </label>
        <label>
            Time (HH:MM)
            <input type="color" id="timeColor">
        </label>
        <label id="colonColorLabel">
            Colons (:)
            <input type="color" id="colonColor">
        </label>
        <label id="inheritColonColorLabel">
            <input type="checkbox" id="inheritColonColor">
            Inherit colon colors
        </label>
        <label>
            Seconds
            <input type="color" id="secColor">
        </label>
    </div>

    <div class="section">
        <h3>Power & Sleep</h3>
        <label>
            Auto-Sleep Timeout
        </label>
        <select id="sleepTimeoutSelect">
            <option value="0">Never</option>
            <option value="1">1 Minute</option>
            <option value="2">2 Minutes</option>
            <option value="5">5 Minutes</option>
            <option value="10">10 Minutes</option>
            <option value="60">60 Minutes</option>
        </select>
    </div>

    <div class="section">
        <h3>Debug</h3>
        <label>
            <input type="checkbox" id="showDebug">
            Show debug overlay
        </label>
    </div>

    <div class="section">
        <h3>Profiles</h3>
        <label>
            Profile name
        </label>
        <input type="text" id="profileName" placeholder="e.g. SCREEN big">

        <button id="saveProfileBtn">Save</button>
        <button id="deleteProfileBtn">Delete</button>
        <button id="downloadProfileBtn">Download</button>
    </div>

    <div class="section" id="ntpSection">
        <h3>Network Time Sync (NTP)</h3>
        <label>
            NTP Server Host
        </label>
        <input type="text" id="ntpServerInput" placeholder="pool.ntp.org">
    </div>

    <div class="section" id="networkSyncSection" style="display: none;">
        <h3>Network Sync</h3>
        <p style="font-size: 11px; color: #888; margin-bottom: 8px;">Control other clocks on your subnet:</p>
        <div id="networkClocksList" style="display: flex; flex-direction: column; gap: 6px;">
            <div style="font-size: 12px; color: #888; font-style: italic;">Scanning network...</div>
        </div>
    </div>
</div>
</body>
</html>
