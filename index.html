<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta property="og:image" content="./screens/screenshot.png">
    <meta name="viewport" content="width=device-width, initial-scale=0.67,
      maximum-scale=0.67, minimum-scale=0.67, user-scalable=no" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"> -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="menuButton">≡</div>
<div id="menuPlaceholder"></div>

<div id="clock">
    <div id="clockInner">
        <div id="dateLine">
            <span id="weekday" class="alpha-group"></span>
            <span id="day" class="numeric-group"></span>
            <span id="month" class="alpha-group"></span>
            <span id="year" class="numeric-group"></span>
        </div>

        <div id="timeLine">
            <span id="hour" class="numeric-group"></span>
            <span id="colon-min" class="numeric-group">:</span>
            <span id="minute" class="numeric-group"></span>
            <span id="colon-sec" class="numeric-group">:</span>
            <span id="sec" class="numeric-group"></span>
        </div>
    </div>
</div>

    <div id="rowCoordinateDisplay" aria-live="polite"></div>


<script>
const days   = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
const simulatedWeekdays = ["MON","TUE","WED","THU","FRI","SAT","SUN"];
const simulatedMonths = ["JAN","FEB","MAR","APR","MAY","JUN","JUL"];
let simulationDigit = null;
let simulationWeekday = null;
let simulationMonth = null;
let timeScaleProbe = null;
let cycleTimer = null;
let cycleStep = 0;
let configurationModeActive = false;

const SIZE_BUDGET = 0.95;
const SCALE_SAFETY = 0.98;
const DEFAULT_WEIGHT_GAP = 0.07;
const DEFAULT_FONT_RATIO = 0.07;

function normalizeSizingWeight(value, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.min(0.99, Math.max(0.01, n));
}

function computeSizingWeights(weightGap, fr) {
  const normalizedGap = normalizeSizingWeight(weightGap, DEFAULT_WEIGHT_GAP);
  const normalizedFr = normalizeSizingWeight(fr, DEFAULT_FONT_RATIO);
  const remaining = Math.max(0, 1 - normalizedGap);
  const weightTime = remaining / (normalizedFr + 1);
  const weightDate = normalizedFr * weightTime;

  return {
    weightGap: normalizedGap,
    fr: normalizedFr,
    weightDate,
    weightTime
  };
}

function getChildrenVisualBounds(element) {
  if (!element) return null;

  const childRects = Array.from(element.children || [])
    .map(child => child.getBoundingClientRect())
    .filter(rect => rect && (rect.width > 0 || rect.height > 0));

  if (!childRects.length) {
    const rect = element.getBoundingClientRect();
    return rect && (rect.width > 0 || rect.height > 0)
      ? { top: rect.top, right: rect.right, bottom: rect.bottom, left: rect.left, width: rect.width, height: rect.height }
      : null;
  }

  const top = Math.min(...childRects.map(rect => rect.top));
  const right = Math.max(...childRects.map(rect => rect.right));
  const bottom = Math.max(...childRects.map(rect => rect.bottom));
  const left = Math.min(...childRects.map(rect => rect.left));

  return {
    top,
    right,
    bottom,
    left,
    width: right - left,
    height: bottom - top
  };
}

function getElementsVisualBounds(elements) {
  const rects = (elements || [])
    .filter(Boolean)
    .map(el => el.getBoundingClientRect())
    .filter(rect => rect && (rect.width > 0 || rect.height > 0));

  if (!rects.length) return null;

  const top = Math.min(...rects.map(rect => rect.top));
  const right = Math.max(...rects.map(rect => rect.right));
  const bottom = Math.max(...rects.map(rect => rect.bottom));
  const left = Math.min(...rects.map(rect => rect.left));

  return {
    top,
    right,
    bottom,
    left,
    width: right - left,
    height: bottom - top
  };
}

function mergeBounds(boundsList) {
  const valid = (boundsList || []).filter(Boolean);
  if (!valid.length) return null;

  const top = Math.min(...valid.map(bounds => bounds.top));
  const right = Math.max(...valid.map(bounds => bounds.right));
  const bottom = Math.max(...valid.map(bounds => bounds.bottom));
  const left = Math.min(...valid.map(bounds => bounds.left));

  return {
    top,
    right,
    bottom,
    left,
    width: right - left,
    height: bottom - top
  };
}

function getTextNodeVisualBounds(textNode) {
  if (!textNode || textNode.nodeType !== Node.TEXT_NODE) return null;
  const text = textNode.textContent || "";
  if (!text.length) return null;

  const range = document.createRange();
  const charBounds = [];

  for (let i = 0; i < text.length; i += 1) {
    const char = text[i];
    if (!char || !char.trim()) continue;

    range.setStart(textNode, i);
    range.setEnd(textNode, i + 1);
    const rect = range.getBoundingClientRect();
    if (rect && (rect.width > 0 || rect.height > 0)) {
      charBounds.push({
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        left: rect.left,
        width: rect.width,
        height: rect.height
      });
    }
  }

  range.detach?.();
  return mergeBounds(charBounds);
}

function getRenderedTextBounds(element) {
  if (!element) return null;

  const walker = document.createTreeWalker(
    element,
    NodeFilter.SHOW_TEXT,
    {
      acceptNode(node) {
        const value = (node && node.textContent) ? node.textContent : "";
        return value.trim().length > 0
          ? NodeFilter.FILTER_ACCEPT
          : NodeFilter.FILTER_SKIP;
      }
    }
  );

  const textBounds = [];
  let current = walker.nextNode();
  while (current) {
    const bounds = getTextNodeVisualBounds(current);
    if (bounds) textBounds.push(bounds);
    current = walker.nextNode();
  }

  return mergeBounds(textBounds);
}

function getElementsRenderedTextBounds(elements) {
  const bounds = (elements || [])
    .filter(Boolean)
    .map(el => getRenderedTextBounds(el))
    .filter(Boolean);
  return mergeBounds(bounds);
}

function getVisualGapPx(upperBounds, lowerBounds) {
  if (!upperBounds || !lowerBounds) return null;
  return lowerBounds.top - upperBounds.bottom;
}

function getVisualBlockHeight(dateLine, timeLine) {
  const dateBounds = getRenderedTextBounds(dateLine) || getChildrenVisualBounds(dateLine);
  const timeBounds = getRenderedTextBounds(timeLine) || getChildrenVisualBounds(timeLine);
  if (!dateBounds || !timeBounds) return 0;
  return Math.max(0, timeBounds.bottom - dateBounds.top);
}

let rowCoordinateUpdatePending = false;

function formatVisualBounds(bounds) {
  if (!bounds) return "n/a";
  return `x=${Math.round(bounds.left)}, y=${Math.round(bounds.top)}, w=${Math.round(bounds.width)}, h=${Math.round(bounds.height)}`;
}

function updateRowCoordinateDisplay() {
  const display = document.getElementById("rowCoordinateDisplay");
  if (!display) return;

  const dateLine = document.getElementById("dateLine");
  const timeLine = document.getElementById("timeLine");
  const dateBounds = getRenderedTextBounds(dateLine) || getChildrenVisualBounds(dateLine);
  const timeBounds = getRenderedTextBounds(timeLine) || getChildrenVisualBounds(timeLine);
  const gapHeight = getVisualGapPx(dateBounds, timeBounds);

  display.textContent = `date ${formatVisualBounds(dateBounds)} | time ${formatVisualBounds(timeBounds)} | gap ${Number.isFinite(gapHeight) ? Math.round(gapHeight) : "n/a"} px`;
}

function scheduleRowCoordinateDisplayUpdate() {
  if (rowCoordinateUpdatePending) return;
  rowCoordinateUpdatePending = true;

  requestAnimationFrame(() => {
    rowCoordinateUpdatePending = false;
    updateRowCoordinateDisplay();
  });
}

function activateConfigurationMode() {
  if (configurationModeActive) return;
  configurationModeActive = true;

  const menuButton = document.getElementById("menuButton");
  if (menuButton) {
    menuButton.style.display = "block";
  }
}

function stopDigitCycle() {
  if (!cycleTimer) return;
  clearInterval(cycleTimer);
  cycleTimer = null;
}

function applyDigitCycleStep() {
  const digit = String(cycleStep % 10);
  simulationDigit = digit;
  simulationWeekday = simulatedWeekdays[cycleStep % simulatedWeekdays.length];
  simulationMonth = months[cycleStep % months.length];
  cycleStep += 1;

  updateClock();
  applyClockTransform();
}

function startDigitCycle() {
  stopDigitCycle();
  cycleStep = 0;
  applyDigitCycleStep();
  cycleTimer = setInterval(applyDigitCycleStep, 200);
}

function ensureTimeScaleProbe() {
  if (timeScaleProbe) return timeScaleProbe;

  const probe = document.createElement("div");
  probe.id = "timeScaleProbe";
  probe.innerHTML = `
    <span class="numeric-group">88</span>
    <span class="numeric-group probe-colon-min">:</span>
    <span class="numeric-group">88</span>
    <span class="numeric-group probe-colon-sec probe-sec">:</span>
    <span class="numeric-group probe-sec">88</span>
  `;

  document.body.appendChild(probe);
  timeScaleProbe = probe;
  return timeScaleProbe;
}

function getWorstCaseTimeWidth() {
  const probe = ensureTimeScaleProbe();
  const probeWidth = probe ? probe.offsetWidth : 0;
  if (probeWidth) return probeWidth;

  const timeLine = document.getElementById("timeLine");
  return timeLine ? timeLine.offsetWidth : 0;
}

function updateClock() {
    const now = new Date();
  const hRaw = String(now.getHours());
  const mRaw = String(now.getMinutes()).padStart(2, "0");
  const sRaw = String(now.getSeconds()).padStart(2, "0");
  const dRaw = String(now.getDate()).padStart(2, "0");
  const monthRaw = months[now.getMonth()];
  const yRaw = String(now.getFullYear());
  const h = simulationDigit ? simulationDigit.repeat(2) : hRaw;
  const m = simulationDigit ? simulationDigit.repeat(2) : mRaw;
  const s = simulationDigit ? simulationDigit.repeat(2) : sRaw;
  const d = simulationDigit ? simulationDigit.repeat(2) : dRaw;
  const month = simulationMonth || monthRaw;
  const y = simulationDigit ? simulationDigit.repeat(yRaw.length) : yRaw;

  const timeLine = document.getElementById("timeLine");

    document.getElementById("hour").textContent     = h;
    document.getElementById("minute").textContent   = m;
    document.getElementById("sec").textContent      = s;

    document.getElementById("weekday").textContent  = simulationWeekday || days[now.getDay()];
    document.getElementById("day").textContent      = d;
    document.getElementById("month").textContent    = month;
    document.getElementById("year").textContent     = y;

    if (timeLine) {
      const hourLeadingOne = h.length === 2 && h.startsWith("1");
      timeLine.classList.toggle("hour-leading-one", hourLeadingOne);
    }

    scheduleRowCoordinateDisplayUpdate();

}

function setSimulationModeByKey(key) {
  stopDigitCycle();

  if (key >= "1" && key <= "8") {
    simulationDigit = key;
    if (key <= "7") {
      simulationWeekday = simulatedWeekdays[Number(key) - 1];
      simulationMonth = simulatedMonths[Number(key) - 1];
    } else {
      simulationWeekday = null;
      simulationMonth = null;
    }
  } else if (key === "0") {
    simulationDigit = null;
    simulationWeekday = null;
    simulationMonth = null;
  } else {
    return;
  }

  updateClock();
  applyClockTransform();
}

function handleKeyDown(e) {
  const key = e.key;
  if (key === "x" || key === "X") {
    activateConfigurationMode();
    return;
  }

  if (key === "r" || key === "R") {
    rotateClock();
    return;
  }

  if (key === "9") {
    startDigitCycle();
    return;
  }

  if (key === " ") {
    setSimulationModeByKey("0");
    return;
  }

  setSimulationModeByKey(key);
}

let rotation = 0;
function applyClockTransform() {
  const clock = document.getElementById("clock");
  const clockInner = document.getElementById("clockInner");
  const dateLine = document.getElementById("dateLine");
  const timeLine = document.getElementById("timeLine");
  const hourEl = document.getElementById("hour");
  const minuteEl = document.getElementById("minute");
  const colonMinEl = document.getElementById("colon-min");
  const secEl = document.getElementById("sec");
  const colonSecEl = document.getElementById("colon-sec");
  if (!clock || !clockInner) return;

  // Always compute fit and spacing in untransformed layout space.
  clockInner.style.transform = "none";
  clockInner.style.paddingTop = "0px";
  clockInner.style.paddingBottom = "0px";
  clockInner.style.rowGap = "0px";

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const currentState = typeof state !== "undefined" ? state : {};
  const sizing = computeSizingWeights(
    dateLine ? dateLine.dataset.weightGap : undefined,
    dateLine ? dateLine.dataset.fr : undefined
  );
  const corrections = typeof window.clockSizeCorrection === "object" && window.clockSizeCorrection
    ? window.clockSizeCorrection
    : { numeric: 1, alpha: 1 };
  const numericCorrection = Math.max(Number(corrections.numeric) || 1, 0.01);
  const alphaCorrection = Math.max(Number(corrections.alpha) || 1, 0.01);

  const availableHeight = SIZE_BUDGET * vh;
  const renderedDateFontSize = availableHeight * sizing.weightDate;
  const renderedTimeFontSize = availableHeight * sizing.weightTime;
  const renderedGap = availableHeight * sizing.weightGap;
  const secFontFactor = Number(currentState.secFontFactor);
  const renderedSecFontSize = renderedTimeFontSize * (Number.isFinite(secFontFactor) && secFontFactor > 0 ? secFontFactor : 0.625);

  if (dateLine) {
    dateLine.style.fontSize = `${renderedDateFontSize / alphaCorrection}px`;
    dateLine.style.marginBottom = "0px";
  }

  if (timeLine) {
    timeLine.style.marginTop = "0px";
  }

  if (hourEl) hourEl.style.fontSize = `${renderedTimeFontSize / numericCorrection}px`;
  if (minuteEl) minuteEl.style.fontSize = `${renderedTimeFontSize / numericCorrection}px`;
  if (colonMinEl) colonMinEl.style.fontSize = `${renderedTimeFontSize / numericCorrection}px`;
  if (secEl) secEl.style.fontSize = `${renderedSecFontSize / numericCorrection}px`;
  if (colonSecEl) colonSecEl.style.fontSize = `${renderedSecFontSize / numericCorrection}px`;

  const probe = ensureTimeScaleProbe();
  const probeMainChars = probe ? probe.querySelectorAll(".numeric-group:not(.probe-sec)") : [];
  const probeSecChars = probe ? probe.querySelectorAll(".probe-sec") : [];
  probeMainChars.forEach(el => {
    el.style.fontSize = `${renderedTimeFontSize / numericCorrection}px`;
  });
  probeSecChars.forEach(el => {
    el.style.fontSize = `${renderedSecFontSize / numericCorrection}px`;
  });

  // Contract: visible gap between date and HH:MM equals weightGap * HH:MM height.
  // Solve once in unscaled glyph space; transform scaling then preserves the ratio.
  const dateBounds = getRenderedTextBounds(dateLine) || getChildrenVisualBounds(dateLine);
  const timeMainBounds = getElementsRenderedTextBounds([hourEl, colonMinEl, minuteEl]) || getElementsVisualBounds([hourEl, colonMinEl, minuteEl]);
  const measuredGap = getVisualGapPx(dateBounds, timeMainBounds);
  const timeMainHeight = Number.isFinite(timeMainBounds?.height) ? Math.max(0, timeMainBounds.height) : 0;
  const targetGap = sizing.weightGap * timeMainHeight;

  if (timeLine) {
    if (Number.isFinite(measuredGap) && Number.isFinite(targetGap)) {
      timeLine.style.marginTop = `${targetGap - measuredGap}px`;
    } else {
      timeLine.style.marginTop = `${renderedGap}px`;
    }
  }

  const worstTimeWidth = getWorstCaseTimeWidth();
  const liveDateWidth = dateLine ? dateLine.offsetWidth : 0;
  const effectiveBlockWidth = Math.max(worstTimeWidth, liveDateWidth) || vw;
  const visualBlockHeight = getVisualBlockHeight(dateLine, timeLine);
  const blockHeight = visualBlockHeight || clockInner.offsetHeight || vh;
  if (!effectiveBlockWidth || !blockHeight) return;

  const orientation = ((rotation % 360) + 360) % 360;
  let scale = 1;
  if (orientation % 180 === 0) {
    scale = Math.min(1, vw / effectiveBlockWidth, vh / blockHeight);
  } else {
    scale = Math.min(1, vw / blockHeight, vh / effectiveBlockWidth);
  }

  if (scale < 1) {
    scale *= SCALE_SAFETY;
  }

  clockInner.style.transform = `rotate(${rotation}deg) scale(${scale})`;
  scheduleRowCoordinateDisplayUpdate();
}

function rotateClock() {
  rotation += 90;
  applyClockTransform();
}

function normalizeRotationIfNeeded() {
  const clockInner = document.getElementById("clockInner");
  if (!clockInner) return;

  const normalized = ((rotation % 360) + 360) % 360;
  if (normalized !== 0 || rotation === 0) return;

  // Snap 360, 720, ... back to 0 without an extra animated jump.
  clockInner.style.transition = "none";
  rotation = 0;
  applyClockTransform();
  void clockInner.offsetWidth;
  clockInner.style.transition = "";
}

async function toggleFullscreen() {
  const doc = document;
  const docEl = document.documentElement;

  const isFull =
    doc.fullscreenElement ||
    doc.webkitFullscreenElement ||
    doc.msFullscreenElement;

  if (isFull) {
    if (doc.exitFullscreen) await doc.exitFullscreen();
    else if (doc.webkitExitFullscreen) doc.webkitExitFullscreen();
    else if (doc.msExitFullscreen) doc.msExitFullscreen();
    return;
  }

  if (docEl.requestFullscreen) await docEl.requestFullscreen();
  else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
  else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
  else console.warn("Fullscreen API not supported on this device/browser");
}

setInterval(updateClock, 250);
updateClock();
applyClockTransform();
document.getElementById("year").addEventListener("click", toggleFullscreen);
document.getElementById("weekday").addEventListener("click", rotateClock);
document.getElementById("sec").addEventListener("click", activateConfigurationMode);
window.addEventListener("resize", applyClockTransform);
window.addEventListener("orientationchange", applyClockTransform);
document.addEventListener("contextmenu", e => { e.preventDefault(); });
window.addEventListener("keydown", handleKeyDown);

(async function showClockWhenFontReady() {
  const isE2E = new URLSearchParams(window.location.search).get("e2e") === "1";
  if (isE2E) {
    const clock = document.getElementById("clock");
    if (clock) {
      clock.style.display = "flex";
      applyClockTransform();
    }
    scheduleRowCoordinateDisplayUpdate();
    return;
  }

  if (document.readyState !== "complete") {
    await new Promise(resolve =>
      window.addEventListener("load", resolve, { once: true })
    );
  }

  try { await document.fonts.load('80px "Digital7Mono"');
  } catch (e) { console.warn("Digital7Mono load error (API-level):", e);}

  const clock = document.getElementById("clock");
  if (clock) {
    clock.style.display = "flex";
    applyClockTransform();
  }
  scheduleRowCoordinateDisplayUpdate();
})();

</script>
