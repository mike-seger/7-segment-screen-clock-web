<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta property="og:image" content="./screens/screenshot.png">
    <meta name="viewport" content="width=device-width, initial-scale=0.67,
      maximum-scale=0.67, minimum-scale=0.67, user-scalable=no" />
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"> -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="menuButton">≡</div>
<div id="menuPlaceholder"></div>

<div id="clock">
    <div id="clockInner">
        <div id="dateLine">
            <span id="weekday" class="alpha-group"></span>
            <span id="day" class="numeric-group"></span>
            <span id="month" class="alpha-group"></span>
            <span id="year" class="numeric-group"></span>
        </div>

        <div id="timeLine">
            <span id="hour" class="numeric-group"></span>
            <span id="colon-min" class="numeric-group">:</span>
            <span id="minute" class="numeric-group"></span>
            <span id="colon-sec" class="numeric-group">:</span>
            <span id="sec" class="numeric-group"></span>
        </div>
    </div>
</div>


<script>
const days   = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
const months = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];
let simulationDigit = null;
let timeScaleProbe = null;

function fitDateLineToWidth(dateLine, targetWidth) {
  if (!dateLine || !targetWidth) return;

  const baseWidth = dateLine.offsetWidth || 0;
  if (!baseWidth) return;

  const scaleX = targetWidth / baseWidth;
  if (!Number.isFinite(scaleX) || scaleX <= 0) return;
  dateLine.style.transform = `scale(${scaleX})`;
}

function ensureTimeScaleProbe() {
  if (timeScaleProbe) return timeScaleProbe;

  const probe = document.createElement("div");
  probe.id = "timeScaleProbe";
  probe.innerHTML = `
    <span class="numeric-group">88</span>
    <span class="numeric-group probe-colon-min">:</span>
    <span class="numeric-group">88</span>
    <span class="numeric-group probe-colon-sec probe-sec">:</span>
    <span class="numeric-group probe-sec">88</span>
  `;

  document.body.appendChild(probe);
  timeScaleProbe = probe;
  return timeScaleProbe;
}

function getWorstCaseTimeWidth() {
  const probe = ensureTimeScaleProbe();
  const probeWidth = probe ? probe.offsetWidth : 0;
  if (probeWidth) return probeWidth;

  const timeLine = document.getElementById("timeLine");
  return timeLine ? timeLine.offsetWidth : 0;
}

function updateClock() {
    const now = new Date();
  const hRaw = String(now.getHours());
  const mRaw = String(now.getMinutes()).padStart(2, "0");
  const sRaw = String(now.getSeconds()).padStart(2, "0");
  const yRaw = String(now.getFullYear());
  const h = simulationDigit ? simulationDigit.repeat(2) : hRaw;
  const m = simulationDigit ? simulationDigit.repeat(2) : mRaw;
  const s = simulationDigit ? simulationDigit.repeat(2) : sRaw;
  const y = simulationDigit ? `${yRaw.slice(0, -1)}${simulationDigit}` : yRaw;

  const timeLine = document.getElementById("timeLine");

    document.getElementById("hour").textContent     = h;
    document.getElementById("minute").textContent   = m;
    document.getElementById("sec").textContent      = s;

    document.getElementById("weekday").textContent  = days[now.getDay()];
    document.getElementById("day").textContent      = String(now.getDate()).padStart(2, "0");
    document.getElementById("month").textContent    = months[now.getMonth()];
    document.getElementById("year").textContent     = y;

    if (timeLine) {
      const hourLeadingOne = h.length === 2 && h.startsWith("1");
      timeLine.classList.toggle("hour-leading-one", hourLeadingOne);
    }

}

function setSimulationModeByKey(key) {
  if (key === "1" || key === "8") {
    simulationDigit = key;
  } else if (key === "0") {
    simulationDigit = null;
  } else {
    return;
  }

  updateClock();
  applyClockTransform();
}

let rotation = 0;
function applyClockTransform() {
  const clock = document.getElementById("clock");
  const clockInner = document.getElementById("clockInner");
  const dateLine = document.getElementById("dateLine");
  if (!clock || !clockInner) return;

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const worstTimeWidth = getWorstCaseTimeWidth();
  const dateWidth = dateLine ? dateLine.offsetWidth : 0;
  const effectiveBlockWidth = Math.max(worstTimeWidth, dateWidth) || vw;
  const dateTargetWidth = effectiveBlockWidth * 0.7;
  fitDateLineToWidth(dateLine, dateTargetWidth);
  const blockHeight = clockInner.offsetHeight || vh;
  if (!effectiveBlockWidth || !blockHeight) return;
  let scale = 1;

  if (rotation % 180 === 0) {
    // Scale against worst-case (all 8s) writing width so the 8-case always fits.
    scale = Math.min(vw / effectiveBlockWidth, vh / blockHeight);
  } else {
    // After 90/270 rotation, width/height are effectively swapped.
    scale = Math.min(vw / blockHeight, vh / effectiveBlockWidth);
  }

  clockInner.style.transform = `rotate(${rotation}deg) scale(${scale})`;
}

function rotateClock() {
  rotation = (rotation + 90) % 360;
  applyClockTransform();
}

async function toggleFullscreen() {
  const doc = document;
  const docEl = document.documentElement;

  const isFull =
    doc.fullscreenElement ||
    doc.webkitFullscreenElement ||
    doc.msFullscreenElement;

  if (isFull) {
    if (doc.exitFullscreen) await doc.exitFullscreen();
    else if (doc.webkitExitFullscreen) doc.webkitExitFullscreen();
    else if (doc.msExitFullscreen) doc.msExitFullscreen();
    return;
  }

  if (docEl.requestFullscreen) await docEl.requestFullscreen();
  else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
  else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
  else console.warn("Fullscreen API not supported on this device/browser");
}

setInterval(updateClock, 250);
updateClock();
applyClockTransform();
document.getElementById("year").addEventListener("click", toggleFullscreen);
document.getElementById("weekday").addEventListener("click", rotateClock);
window.addEventListener("resize", applyClockTransform);
window.addEventListener("orientationchange", applyClockTransform);
document.addEventListener("contextmenu", e => { e.preventDefault(); });
window.addEventListener("keydown", e => setSimulationModeByKey(e.key));

(async function showClockWhenFontReady() {
  if (document.readyState !== "complete") {
    await new Promise(resolve =>
      window.addEventListener("load", resolve, { once: true })
    );
  }

  try { await document.fonts.load('80px "Digital7Mono"');
  } catch (e) { console.warn("Digital7Mono load error (API-level):", e);}

  const clock = document.getElementById("clock");
  if (clock) {
    clock.style.display = "flex";
    applyClockTransform();
  }
})();

</script>
